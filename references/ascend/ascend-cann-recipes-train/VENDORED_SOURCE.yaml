notes:
  - Reports DeepSeek-V4-Flash BF16 4K training on 64 Atlas A3 cards.
  - Uses pure FSDP plus large EP, TorchTitan-NPU, CANN AutoFuse, and custom sparse-attention fusion operators.
  - Public performance anchor used by this experiment is 1100 tokens/GPU/s for the 43-layer Flash configuration.
  - Equivalent 8xMI350 end-to-end target is 8800 tokens/s node-wide and approximately 244.5 TFLOPs/GPU/s with the current 4K microbench FLOP accounting.
