# Pre-commit (https://pre-commit.com) configuration for assorted lint checks.
#
# See https://pre-commit.com/hooks.html for more hooks.

# Top level exclusions from all hooks. Some of these could be moved into more
# specific exclusions like check-yaml and clang-format, but for large generated
# files even simple hooks like trailing-whitespace can be expensive.
#
# Note the yaml multiline literal and (?x) regex flag used here, see
# https://pre-commit.com/#regular-expressions.
exclude: |
  (?x)
    # These subprojects are not yet migrated to the superrepo and have alterate
    # sources of truth, so do not run checks on their code.
    projects/composablekernel/.*|
    projects/hipsolver/.*|
    projects/rocsolver/.*|
    # Large yaml files
    projects/hipblaslt/library/src/amd_detail/rocblaslt/src/Tensile/.*|
    # Large (20k+ LOC) source files
    projects/hipblaslt/tensilelite/Tensile/CustomKernels/.*|
    # Generated test yaml files
    projects/hipblaslt/tensilelite/Tensile/Tests/.*|
    # Large source files
    projects/miopen/src/kernels/.*|
    # Generated files (see rocrand/tools/ _generator.cpp files)
    projects/rocrand/library/.*precomputed\.(cpp|h)|
    projects/rocrand/library/.*constants\.(cpp|h)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 22.10.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.4
    hooks:
      - id: clang-format
        name: clang-format (C/C++/ObjC)
        entry: clang-format -i -style=file
        files: '\.(c|cpp|cc|h|hpp|m|mm)$'

  - repo: local
    hooks:
      - id: flatc-hipdnn
        name: flatc (hipDNN)
        entry: |
          python -c "
          import sys, subprocess, shutil

          REQUIRED_VER = '25.9.23'
          current_ver = ''

          if shutil.which('flatc'):
              try:
                  current_ver = subprocess.check_output([flatc, '--version'], text=True).strip()
              except subprocess.CalledProcessError:
                  pass

          if REQUIRED_VER not in current_ver:
              print(f'ERROR: flatc version {REQUIRED_VER} required. Found: {current_ver or \"None\"}', file=sys.stderr)
              print('Download the following and include the executable in PATH:', file=sys.stderr)
              print(f'  Windows: Download https://github.com/google/flatbuffers/releases/download/v{REQUIRED_VER}/Windows.flatc.binary.zip', file=sys.stderr)
              print(f'  Linux:   wget https://github.com/google/flatbuffers/releases/download/v{REQUIRED_VER}/Linux.flatc.binary.g++-10.zip', file=sys.stderr)
              sys.exit(1)

          for f in sys.argv[1:]:
              result = subprocess.run([
                  flatc,
                  '-I', 'projects/hipdnn/sdk/schemas',
                  '--cpp', '--gen-object-api', '--gen-mutable',
                  '--gen-compare', '--defaults-json', '--scoped-enums',
                  '-o', 'projects/hipdnn/sdk/include/hipdnn_sdk/data_objects',
                  f
              ])
              if result.returncode != 0:
                  sys.exit(1)
          "
        language: system
        files: ^projects/hipdnn/sdk/schemas/.*\.fbs$
        pass_filenames: true

  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.10
    hooks:
      - id: cmake-format
      - id: cmake-lint
