- name: strix_halo_bf16_bias_activation
  category: nightly
  function:
    matmul: *hpa_bf16_precision
  matrix_size:
    - { M: 512, N: 512, K: 512, batch_count: 1 }
    - { M: 1024, N: 1024, K: 256, batch_count: 1 }
