# SECTION 7: FP32 and FP64 Tests (Equality Matching)
#===================================================================================
- name: strix_halo_fp32_basic
  category: quick
  function:
    matmul: *single_precision
  matrix_size:
    - { M: 128, N: 128, K: 128, batch_count: 1 }
    - { M: 256, N: 256, K: 256, batch_count: 1 }
    - { M: 512, N: 512, K: 512, batch_count: 1 }
