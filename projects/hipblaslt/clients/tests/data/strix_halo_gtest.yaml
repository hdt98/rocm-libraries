# SECTION 11: Auxiliary Output Tests (Gap Coverage)
#===================================================================================
- name: strix_halo_aux_output_fp16
  category: nightly
  function:
    matmul: *hpa_half_precision
  matrix_size:
    - { M: 256, N: 256, K: 256, batch_count: 1 }
    - { M: 512, N: 512, K: 512, batch_count: 1 }
  transA: N
  transB: N
  alpha: [ 1.0 ]
  beta: [ 0.0 ]
  activation_type: [ relu, gelu ]
  bias_vector: true
  bias_source: d
  bias_type: f16_r
  use_e: true
  e_type: f16_r
  arch: *strix_halo_archs

- name: strix_halo_aux_output_bf16
  category: nightly
  function:
    matmul: *hpa_bf16_precision
  matrix_size:
    - { M: 256, N: 256, K: 256, batch_count: 1 }
    - { M: 512, N: 512, K: 512, batch_count: 1 }
  transA: N
  transB: N
  alpha: [ 1.0 ]
  beta: [ 0.0 ]
  activation_type: [ relu, gelu ]
  bias_vector: true
  bias_source: d
  bias_type: bf16_r
  use_e: true
  e_type: bf16_r
  arch: *strix_halo_archs

#===================================================================================
# SECTION 12: Stress Tests (Memory Bandwidth Limited)
#===================================================================================
- name: strix_halo_stress_large_batch
  category: nightly
  function:
    matmul: *hpa_half_precision
  matrix_size:
    - { M: 256, N: 256, K: 256, batch_count: 64 }
    - { M: 512, N: 512, K: 512, batch_count: 32 }
  transA: N
  transB: N
  alpha: [ 1.0 ]
  beta: [ 0.0 ]
  arch: *strix_halo_archs

- name: strix_halo_stress_memory_bound
  category: nightly
  function:
    matmul: *hpa_half_precision
  matrix_size:
    - { M: 8192, N: 8192, K: 8, batch_count: 1 }
    - { M: 16384, N: 16384, K: 16, batch_count: 1 }
  transA: N
  transB: N
  alpha: [ 1.0 ]
  beta: [ 0.0 ]
  arch: *strix_halo_archs
