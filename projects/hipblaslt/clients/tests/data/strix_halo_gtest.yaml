#===================================================================================
# SECTION 10: Performance Critical Workloads (Common ML Sizes)
#===================================================================================
- name: strix_halo_ml_workloads_bert
  category: nightly
  function:
    matmul: *hpa_half_precision
  matrix_size:
    - { M: 512, N: 512, K: 512, batch_count: 12 }   # BERT base attention
    - { M: 512, N: 3072, K: 512, batch_count: 12 }  # BERT FFN
