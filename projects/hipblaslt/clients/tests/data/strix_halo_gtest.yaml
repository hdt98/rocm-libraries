  arch: *strix_halo_archs

- name: strix_halo_fp8_fnuz_dst_bf16
  category: nightly
  function:
    matmul:
      - { a_type: f8_fnuz_r, b_type: f8_fnuz_r, c_type: bf16_r, d_type: bf16_r, compute_type: c_f32_r, scale_type: f32_r }
      - { a_type: bf8_fnuz_r, b_type: bf8_fnuz_r, c_type: bf16_r, d_type: bf16_r, compute_type: c_f32_r, scale_type: f32_r }
  matrix_size:
    - { M: 256, N: 256, K: 256, batch_count: 1 }
    - { M: 512, N: 512, K: 512, batch_count: 1 }
  transA: N
  transB: N
  alpha: [ 1.0 ]
  beta: [ 0.0 ]
  arch: *strix_halo_archs

#===================================================================================
# SECTION 5: FP8/BF8 Tests (OCP format) - Gap Coverage
#===================================================================================
- name: strix_halo_fp8_ocp_basic
  category: nightly
  function:
    matmul: *fp8_ocp_test_configs
  matrix_size:
    - { M: 256, N: 256, K: 256, batch_count: 1 }
