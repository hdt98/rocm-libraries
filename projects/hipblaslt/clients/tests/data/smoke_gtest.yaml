---
include: hipblaslt_common.yaml
include: known_bugs.yaml
include: matmul_common.yaml

Definitions:
  - &alpha_beta_range
    - { alpha:  5, beta:  0 }
    - { alpha:  0, beta:  3 }
    - { alpha:  1, beta:  3 }
    - { alpha:  1, beta:  1 }

  - &alpha_beta_range_small
    - { alpha: 2, alphai: 2, beta: -1.0, betai: 2.0 }

  - &transA_transB_range
    - { transA: N, transB: N }
    - { transA: N, transB: T }
    - { transA: T, transB: N }
    - { transA: T, transB: T }

Tests:
- name: matmul_smoke
  category: smoke
  function:
    matmul: *real_precisions
  matrix_size: *smoke_matrix_size_range
  transA_transB: *transA_transB_range
  alpha_beta: *alpha_beta_range

- name: matmul_bias_relu_smoke
  category: smoke
  function:
    matmul: *real_precisions
  matrix_size: *smoke_matrix_size_range
  transA_transB: *transA_transB_range
  alpha: 1
  beta: [ 0.0, 2.0 ]
  activation_type: relu
  bias_vector: [0, 1]
  unit_check: 1

- name: matmul_bias_sigmoid_smoke
  category: smoke
  function:
    matmul: *real_precisions
  matrix_size: *smoke_matrix_size_range
  transA_transB: *transA_transB_range
  alpha: 1
  beta: [ 0.0, 2.0 ]
  activation_type: sigmoid
  bias_vector: [0, 1]
  unit_check: 1

