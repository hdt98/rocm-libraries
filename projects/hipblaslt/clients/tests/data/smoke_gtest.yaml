###################################
# Additional Coverage Tests       #
###################################

# Swish activation
- name: matmul_bias_swish_smoke
  category: smoke
  function:
    matmul: *real_precisions
  matrix_size: *smoke_matrix_size_range
  transA: N
  transB: N
  alpha: 1
  beta: 0
  activation_type: swish
  bias_vector: [0, 1]
  unit_check: 0
  norm_check: 1

# Clamp activation
- name: matmul_bias_clamp_smoke
  category: smoke
  function:
    matmul: *real_precisions
  matrix_size: *smoke_matrix_size_range
  transA: N
  transB: N
  alpha: 1
  beta: 0
  activation_type: clamp
  activation_arg1: -1.5
  activation_arg2: 1.5
  bias_vector: [0, 1]
  unit_check: 0
  norm_check: 1

# Auxiliary output with GELU
- name: matmul_gelu_aux_smoke
  category: smoke
  function:
    matmul: *hpa_half_precision
  matrix_size: *smoke_matrix_size_range
  transA: N
  transB: N
  alpha: 1
  beta: 0
  use_e: 1
  activation_type: gelu
  unit_check: 0
  norm_check: 1

# DGELU gradient
- name: matmul_dgelu_smoke
