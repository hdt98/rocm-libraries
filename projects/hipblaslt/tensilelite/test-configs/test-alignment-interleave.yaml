# Test configuration for Address Interleaving alignment optimization
# This tests the case where misaligned stride causes 20-25% performance drop

GlobalParameters:
  MinimumRequiredVersion: 4.4.0
  PrintLevel: 1
  ForceRedoBenchmarkProblems: True
  ForceRedoLibraryLogic: True
  ForceRedoLibraryClient: True
  CMakeBuildType: Release
  EnqueuesPerSync: 1
  SyncsPerBenchmark: 1
  LibraryPrintDebug: False
  NumElementsToValidate: 0
  ValidationMaxToPrint: 0
  ValidationPrintValids: False
  ShortNames: False
  MergeFiles: True
  PlatformIdx: 0
  DeviceIdx: 0
  DataInitTypeBeta: 0

BenchmarkProblems:
  - # TN GEMM - Misaligned case (K=1880, stride=3760 bytes for BFP16)
    - # ProblemType
      OperationType: GEMM
      DataType: b                # BFP16
      DestDataType: b
      ComputeDataType: s         # FP32 compute
      HighPrecisionAccumulate: True
      TransposeA: True           # A is transposed (K-major)
      TransposeB: False          # B is not transposed (K-major)
      UseBeta: True
      Batched: False

    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - EdgeType: ["ShiftPtr"]
        - LoopTail: [True]
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
        - PrefetchGlobalRead: [True]
        - GlobalSplitU: [1]
        
        # Address Interleaving Parameters
        - EnableAddressInterleave: [True]
        - AddressInterleaveDirection: ["N"]      # Interleave in N direction for B matrix
        - AddressInterleaveAlignment: [256]      # Target 256-byte (cacheline) alignment
        - AddressInterleaveTileSize: [16]        # Use 16 kernels for interleaving
        
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 4, 1]
          - [32, 32, 2, 1]
        - ThreadTile:
          - [4, 4]
          - [4, 8]
          - [8, 4]
        - WorkGroup:
          - [16, 16, 1]
          - [32, 8, 1]
        - DepthU: [16, 32, 64]
        - VectorWidthA: [1, 2]
        - VectorWidthB: [1, 2]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # Original problem case: 2048x3072x1880
          # Stride for K=1880 with BFP16 (2 bytes) = 3760 bytes
          # This is NOT aligned to 256-byte cacheline
          - Range: [[2048], [3072], [1880, 1920, 2048]]  # Test K=1880 (misaligned), 1920 (padded), 2048 (aligned)
          
          # Additional test cases with various misalignments
          - Range: [[1024, 4096, 64], [1024, 4096, 64], [960, 1880, 64]]  # Various misaligned K values
          
          # Test aligned cases for baseline comparison
          - Range: [[2048], [2048], [1024, 2048, 4096]]  # Aligned K values
          
          # Small sizes for quick validation
          - Exact: [512, 512, 1880]
          - Exact: [512, 512, 1920]
          - Exact: [1024, 1024, 1880]
          - Exact: [1024, 1024, 1920]

    - # BenchmarkProblemSizeGroup - Baseline without alignment optimization
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - EdgeType: ["ShiftPtr"]
        - LoopTail: [True]
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
        - PrefetchGlobalRead: [True]
        - GlobalSplitU: [1]
        
        # Disable address interleaving for baseline
        - EnableAddressInterleave: [False]
        
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 4, 1]
          - [32, 32, 2, 1]
        - ThreadTile:
          - [4, 4]
          - [4, 8]
        - [8, 4]
        - WorkGroup:
          - [16, 16, 1]
          - [32, 8, 1]
        - DepthU: [16, 32, 64]
        - VectorWidthA: [1, 2]
        - VectorWidthB: [1, 2]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # Same problem sizes as above for comparison
          - Range: [[2048], [3072], [1880, 1920, 2048]]
          - Exact: [512, 512, 1880]
          - Exact: [1024, 1024, 1880]

LibraryLogic:
  ScheduleName: "vega20"
  DeviceNames: ["Device 0000"]
  ArchitectureName: "gfx942"

# Expected Results:
# - Without EnableAddressInterleave: ~20-25% performance drop for K=1880 vs K=1920
# - With EnableAddressInterleave: Performance should be similar for K=1880 and K=1920
# - Target: Eliminate or significantly reduce the performance gap

