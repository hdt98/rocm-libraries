# benchmark assembly and source kernels
GlobalParameters:
#  MinimumRequiredVersion: 4.2.0
  CMakeBuildType: Release
  PrintLevel: 1
  ForceRedoBenchmarkProblems: True
  ForceRedoLibraryLogic: True
  ForceRedoLibraryClient: True
  EnqueuesPerSync: 1
  SyncsPerBenchmark: 1
  NumElementsToValidate: -1
  ValidationMaxToPrint: 4
  ValidationPrintValids: False
  # PrintTensorD: 0x3
  # PrintTensorC: 0x3
  # PrintTensorB: 0x3
  # PrintTensorA: 0x3 #0x1
  # PrintTensorRef: 0x3
  # ShortNames: False
  # MergeFiles: True
  DataInitTypeA: 3 #12 #3
  DataInitTypeB: 3 #13 #3
  DataInitTypeC: 3 #3
  DataInitTypeAlpha: 3
  DataInitTypeBeta: 3
  KernelTime: True
  PrintSolutionRejectionReason: True

BenchmarkProblems:

  - # zgemm NN
    - # ProblemType
      OperationType: GEMM
      DataType: Z
      DestDataType: Z
      ComputeDataType: Z
      UseBeta: True
      Batched: True
      TransposeA: False
      TransposeB: False
      ComplexConjugateA: False
      ComplexConjugateB: False

    - # BenchmarkProblemSizeGroup - Assembly
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        # - LoopTail: [True]
        # - EdgeType: ["ShiftPtr"]
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        # - StoreCInUnroll: [False]
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 1, 1, 1, 1] #16x16
          - [16, 16, 4, 1, 1, 4, 4, 2, 2] #128x128
          - [16, 16, 4, 1, 1, 2, 2, 2, 2] #64x64
          - [16, 16, 4, 1, 1, 1, 1, 2, 2] #32x32
          # - [16, 16, 4, 1, 1, 8, 4, 2, 2] #256x128
          # - [16, 16, 4, 4, 1, 2, 2, 4, 1] #128x128 not-working
          # - [16, 16, 4, 4, 4, 4, 4, 1, 4] #256x256 not-working
          # - [16, 16, 4, 1, 1, 2, 2, 2, 2]
        - ScheduleIterAlg: [1]
        - GlobalSplitU: [1] #, 3]
        # - StreamK: [3]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [2]
        # - ThreadTile:
          ##- [ 3, 5 ]
          # - [ 2, 2 ]
          # - [ 8, 8 ]
        # - WorkGroup:
          # - [ 32,  4,  1 ]
          # - [  4,  4,  2 ]
        - DepthU: [8] #,16,32]
        # - VectorWidth: [-1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [2, 2, 1, 2]
          - Exact: [16, 16, 1, 2]
          - Exact: [2048, 2048, 1, 512] #128x128(times16)
          - Exact: [1024, 1024, 1, 64] #64x64(times16)
          - Exact: [512, 512, 1, 32] #32x32
          # - Exact: [32, 32, 1, 8]
          # - Exact: [16, 16, 1, 2]
          # - Exact: [64, 64, 1, 16]
          # - Exact: [64, 64, 1, 128]
          # - Exact: [4096, 4096, 1, 8192]

          # - Range: [[16,37, 512],[16,57,512],[1],[1,1,64]]
          # - Range: [ [127,1,129], 0, [2], [63,1,64] ]

