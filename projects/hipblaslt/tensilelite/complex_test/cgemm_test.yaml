# benchmark assembly and source kernels
GlobalParameters:
#  MinimumRequiredVersion: 4.2.0
  CMakeBuildType: Release
  PrintLevel: 1
  ForceRedoBenchmarkProblems: True
  ForceRedoLibraryLogic: True
  ForceRedoLibraryClient: True
  EnqueuesPerSync: 1
  SyncsPerBenchmark: 1
  NumElementsToValidate: -1
  ValidationMaxToPrint: 4
  ValidationPrintValids: False
  # PrintTensorD: 0x3
  # PrintTensorC: 0x3
  # PrintTensorB: 0x3
  # PrintTensorA: 0x3 #0x1
  # PrintTensorRef: 0x3
  # ShortNames: False
  # MergeFiles: True
  #       - Problem-Independent: 0=0, 1=1, 2=2, 3=rand, 4=Nan, 5=Infinity, 6=BadInput(Nan), 7=BadOutput(Inf), 16=RandomNarrow,
  DataInitTypeA: 12 #12 #3
  DataInitTypeB: 13 #13 #3
  DataInitTypeC: 12 #3
  DataInitTypeAlpha: 2
  DataInitTypeBeta: 2
  KernelTime: True
  PrintSolutionRejectionReason: True

BenchmarkProblems:

- - Batched: true
    ComputeDataType: c
    DataType: c
    DestDataType: c
    HighPrecisionAccumulate: false
    IndexAssignmentsA: [0, 3, 2]
    IndexAssignmentsB: [1, 3, 2]
    IndexAssignmentsLD: [4, 5, 6, 7]
    NumIndicesC: 3
    OperationType: GEMM
    # StridedBatched: false
    TransposeA: false
    TransposeB: true
    UseBeta: true
  - InitialSolutionParameters: null
    BenchmarkCommonParameters: null
    ForkParameters:
    - 1LDSBuffer: [1]
    # - AssertMinApproxSize: [3]
    # - AssertStrideAEqual:
    #   - {0: 1}
    # - AssertStrideBEqual:
    #   - {0: 1}
    # - AssertStrideCEqual:
    #   - {0: 1}
    # - AssertStrideDEqual:
    #   - {0: 1}
    - BufferLoad: [1]
    - BufferStore: [1]
    - DepthU: [8]
    # - EdgeType: [ShiftPtr]
    - ExpandPointerSwap: [0] #,1]
    - GlobalReadVectorWidthA: [-1] #, 1, 2]
    - GlobalReadVectorWidthB: [-1] #, 1, 2]
    # - GlobalReadVectorWidth: [2]
    - KernelLanguage: [Assembly]
    - LdsBlockSizePerPadA: [-1] #, 0, 64]
    - LdsBlockSizePerPadB: [-1] #, 0, 64]
    - LdsPadA: [-1] #, 0, 1, 2]
    - LdsPadB: [-1] #, 0, 1, 2]
    - LocalReadVectorWidth: [1]
    - MIArchVgpr: [0] #,1]
    - MatrixInstruction:
      # - [16, 16, 4, 1, 1, 2, 2, 4, 1]
      # - [16, 16, 4, 1, 1, 2, 2, 2, 2]
      - [16, 16, 4, 1, 1, 1, 1, 1, 1]
    - NumElementsPerBatchStore: [4]
    - PrefetchGlobalRead: [1]
    - PrefetchLocalRead: [1]
    - ScheduleIterAlg: [3]
    - SourceSwap: [0] #, 1]
    - StaggerU: [2]
    # - StaggerUStride: [-1, 128, 256]
    # - StaggerUMapping: [0, 1, 2, 3, 4]
    - StoreVectorWidth: [2]
    # - VectorAtomicWidth: [1]
    # - VectorWidth: [2]
    - VectorWidthA: [1]
    - VectorWidthB: [1]
    - GlobalReadPerMfma: [1] #, 0.9]
    - LocalWritePerMfma: [0.9] #, 1]
    - WaveSeparateGlobalReadA: [0] #, 1, 2]
    - WaveSeparateGlobalReadB: [0] #, 1, 2]
    # - DirectToLds: [1]
    - DirectToVgprA: [0] #,1]
    - DirectToVgprB: [0] #,1]
    # - NumLoadsCoalescedA: [-1, 1]
    # - NumLoadsCoalescedB: [-1, 1]
    # - UseInstOffsetForGRO: [-1, 0, 1]
    # - UseSgprForGRO: [-1, 0, 1]
    - ClusterLocalRead: [0] #, 1]
    - TransposeLDS: [-1] #, 1, 0, 2]
    - ConvertAfterDS: [0] #, 1]
    - StoreRemapVectorWidth: [0] #, -1, 1, 2]
    - StorePriorityOpt: [0] #, 1]
    - StoreSyncOpt: [0] #, 10]
    - VectorStore: [0] #, -1, 1]
    # - WorkGroupMapping: [8]
    # - WorkGroupMappingXCC: [2]
    # - WorkGroupMappingXCCGroup: [2]
    # - PreloadKernArgs: [0, 1]
    - NonTemporalA: [0] #, 1, 2] #, 3, 4, 5, 6, 7]
    - NonTemporalB: [0] #, 1, 2] #, 3, 4, 5, 6, 7]
    - NonTemporalC: [0] #, 1, 2] #, 3, 4, 5, 6, 7]
    - NonTemporalD: [0] #, 1, 2] #, 3, 4, 5, 6, 7]
    - NonTemporalE: [0] #, 1, 2] #, 3, 4, 5, 6, 7]
    BenchmarkJoinParameters: null
    BenchmarkFinalParameters:
    - ProblemSizes:
      - Exact: [16, 16, 1, 2]
  
