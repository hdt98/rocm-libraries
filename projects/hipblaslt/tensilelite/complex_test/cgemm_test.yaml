# benchmark assembly and source kernels
GlobalParameters:
#  MinimumRequiredVersion: 4.2.0
  CMakeBuildType: Release
  PrintLevel: 1
  ForceRedoBenchmarkProblems: True
  ForceRedoLibraryLogic: True
  ForceRedoLibraryClient: True
  EnqueuesPerSync: 1
  SyncsPerBenchmark: 1
  NumElementsToValidate: -1
  ValidationMaxToPrint: 4
  ValidationPrintValids: False
  PrintTensorD: 0x3
  PrintTensorC: 0x3
  PrintTensorB: 0x3
  PrintTensorA: 0x3 #0x1
  PrintTensorRef: 0x3
  # ShortNames: False
  # MergeFiles: True
  #       - Problem-Independent: 0=0, 1=1, 2=2, 3=rand, 4=Nan, 5=Infinity, 6=BadInput(Nan), 7=BadOutput(Inf), 16=RandomNarrow,
  DataInitTypeA: 12 #12 #3
  DataInitTypeB: 13 #13 #3
  DataInitTypeC: 12 #3
  DataInitTypeAlpha: 2
  DataInitTypeBeta: 2
  KernelTime: True
  PrintSolutionRejectionReason: True

BenchmarkProblems:

- - Batched: true
    ComputeDataType: c
    DataType: c
    DestDataType: c
    HighPrecisionAccumulate: false
    IndexAssignmentsA: [0, 3, 2]
    IndexAssignmentsB: [1, 3, 2]
    IndexAssignmentsLD: [4, 5, 6, 7]
    NumIndicesC: 3
    OperationType: GEMM
    # StridedBatched: false
    TransposeA: false
    TransposeB: true
    UseBeta: true
  - InitialSolutionParameters: null
    BenchmarkCommonParameters: null
    ForkParameters:
    - 1LDSBuffer: [0]
    # - AssertMinApproxSize: [3]
    # - AssertStrideAEqual:
    #   - {0: 1}
    # - AssertStrideBEqual:
    #   - {0: 1}
    # - AssertStrideCEqual:
    #   - {0: 1}
    # - AssertStrideDEqual:
    #   - {0: 1}
    # - BufferLoad: [0]
    # - BufferStore: [0]
    - DepthU: [8]
    # - EdgeType: [ShiftPtr]
    # - ExpandPointerSwap: [0]
    # - GlobalReadVectorWidthA: [2]
    # - GlobalReadVectorWidthB: [1]
    # - GlobalReadVectorWidth: [2]
    - KernelLanguage: [Assembly]
    # - LdsBlockSizePerPadA: [0]
    # - LdsBlockSizePerPadB: [0]
    # - LdsPadA: [0]
    # - LdsPadB: [0]
    # - LocalReadVectorWidth: [1]
    - MIArchVgpr: [0] #,1]
    - MatrixInstruction:
      # - [16, 16, 4, 1, 1, 2, 2, 4, 1]
      - [16, 16, 4, 1, 1, 2, 2, 2, 2]
    # - NumElementsPerBatchStore: [4]
    - PrefetchGlobalRead: [2]
    - PrefetchLocalRead: [3]
    - ScheduleIterAlg: [3]
    - SourceSwap: [0]
    - StaggerU: [2]
    - StaggerUStride: [256]
    - StoreVectorWidth: [2]
    # - VectorAtomicWidth: [1]
    # - VectorWidth: [2]
    - VectorWidthA: [2]
    - VectorWidthB: [2]
    BenchmarkJoinParameters: null
    BenchmarkFinalParameters:
    - ProblemSizes:
      - Exact: [16, 16, 1, 2]
  
