GlobalParameters:
  #MinimumRequiredVersion: 4.14.0
  SleepPercent: 50
  NumElementsToValidate: 0
  
  NumWarmups: 1000
  EnqueuesPerSync: 1000


  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1

  DataInitTypeA: 12
  DataInitTypeB: 13

  NewClient: 2
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  PrintSolutionRejectionReason: True
  
  RotatingBufferSize: 512


  DeviceLDS: 163840
  MaxLDS: 163840

BenchmarkProblems:
  ########################################
  # NN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      UseBias: 0 # 1
      Batched: True
      Activation: False
      ActivationHPA: False
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [32, 32, 16, 1, 1, 2, 2, 2, 2 ]  
          - [32, 32, 16, 1, 1, 4, 4, 2, 2 ] 
          - [32, 32, 16, 1, 1, 1, 1, 4, 1 ]
          - [32, 32, 16, 1, 1, 2, 1, 4, 1 ] 
            #          - [16, 16,32, 1,  1,   2, 1,  4,1 ]
                    #  - [32, 32, 16, 1,  1,   1, 1,  4,1 ]
            #          - [16, 16,32, 1,  1,   5, 1,  2,2 ]
            #          - [16, 16,32, 1,  1,   6, 1,  2,2 ]
            #          - [16, 16,32, 1,  1,   7, 1,  2,2 ]
                    #  - [32, 32, 16, 1,  1,   2, 1,  4,1 ]
            #          - [16, 16,32, 1,  1,   1, 3,  4,1 ]
        - PrefetchGlobalRead: [2] #[1,2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]
        - DepthU: [64]
        - LocalReadVectorWidth: [8]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [1] #0,1
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - StaggerU: [0]
        - StaggerUStride: [64]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1]
        #- PreloadKernArgs: [0, 1]
        #        - GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - SourceSwap: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 8192]
