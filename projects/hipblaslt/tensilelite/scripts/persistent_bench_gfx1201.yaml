# Benchmark kernel for gfx1201 (RDNA4, RX 9000 series).
# StreamK: 4 (dynamic work queue, commit 5ebff00cb0).
# Run with TENSILE_STREAMK_FIXED_GRID=<TOTAL_CUS> to occupy the full device.
# gfx1201 typical CU counts: RX 9070-class = 64, lower SKUs less.
#
# NOTE: StreamK has no test coverage on RDNA in this tree. If StreamK 4 is
# rejected at codegen time on this arch, fall back to a non-StreamK
# benchmark YAML (StreamK: 0) to first verify the rest of Phase 2 works,
# then revisit Stream-K-on-RDNA separately.

GlobalParameters:
  NumElementsToValidate: 0
  BoundsCheck: False
  KernelTime: True
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  MaxWorkspaceSize: 134217728
  NumWarmups: 3
  EnqueuesPerSync: 10
  NumBenchmarks: 3
  SyncsPerBenchmark: 1

BenchmarkProblems:
  - # HGEMM NT
    - OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - WavefrontSize: [32]
        - MatrixInstruction: [[16, 16, 16, 1, 1, 4, 4, 2, 2]]
        - DepthU: [32]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [0]
        - SourceSwap: [True]
        - StreamK: [4]
        - WorkGroupMapping: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 4096]
