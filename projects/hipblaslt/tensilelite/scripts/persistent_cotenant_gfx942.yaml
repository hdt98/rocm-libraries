# Co-tenant kernel for in-process contended-perf benchmarking on MI300/MI350 (gfx942 / gfx950).
#
# StreamK: 3 enables the persistent loop; PersistentKernelHostStop: True makes
# the loop epilogue read a host-writable 32-bit stop_flag from device memory
# and exit when non-zero. Termination is via tensilelite-client writing 1 to
# that flag from another stream after the benchmark completes.
#
# Match this kernel's problem shape to the benchmark's first problem
# (scripts/persistent_bench_gfx942.yaml). The client launches the co-tenant
# with the benchmark's just-prepared A/B/C/D buffers; co-tenant outputs are
# never validated.

GlobalParameters:
  NumElementsToValidate: 0
  BoundsCheck: False
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  MaxWorkspaceSize: 134217728
  NumWarmups: 0
  EnqueuesPerSync: 0
  NumBenchmarks: 0

BenchmarkProblems:
  - # HGEMM NT
    - OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - 1LDSBuffer: [1]
        - DepthU: [64]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - GlobalSplitU: [0]
        - MatrixInstruction: [[16, 16, 16, 1, 1, 4, 4, 2, 2]]
        - MIArchVgpr: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - StreamK: [3]
        - PersistentKernelHostStop: [True]
        - TransposeLDS: [0]
        - WorkGroupMapping: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 4096]
