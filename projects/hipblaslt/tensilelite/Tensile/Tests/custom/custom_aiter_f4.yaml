TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  MinimumRequiredVersion: 5.0.0
  SleepPercent: 50
  NumElementsToValidate: -1
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeA: 3
  DataInitTypeB: 3
  NewClient: 2
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  PrintSolutionRejectionReason: True
  DeviceLDS: 163840
  MaxLDS: 163840

BenchmarkProblems:
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 0
      Activation: False
      UseScaleAlphaVec: 0
      SwizzleTensorA: True
      SwizzleTensorB: False
      MXBlockA: 32
      MXBlockB: 32

    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - CustomKernel:
          - name: "_ZN5aiter42f4gemm_bf16_per1x32Fp4_BpreShuffle_256x256E"
            args: [ { type: address, semantic: AddressD,         padding: 8  },
                    { type: address, semantic: AddressC,         padding: 8  },
                    { type: address, semantic: AddressB,         padding: 8  },
                    { type: address, semantic: AddressA,         padding: 8  },
                    { type: float32, semantic: Alpha,            padding: 12 },
                    { type: float32, semantic: Beta,             padding: 12 },
                    { type: uint32,  semantic: StrideD0,         padding: 12 },
                    { type: uint32,  semantic: StrideD1,         padding: 12 },
                    { type: uint32,  semantic: StrideC0,         padding: 12 },
                    { type: uint32,  semantic: StrideC1,         padding: 12 },
                    { type: uint32,  semantic: StrideB0,         padding: 12 },
                    { type: uint32,  semantic: StrideB1,         padding: 12 },
                    { type: uint32,  semantic: StrideA0,         padding: 12 },
                    { type: uint32,  semantic: StrideA1,         padding: 12 },
                    { type: uint32,  semantic: SizeFree1,        padding: 12 },
                    { type: uint32,  semantic: SizeFree0,        padding: 12 },
                    { type: uint32,  semantic: SizeSum,          padding: 12 },
                    { type: address, semantic: AddressMXScaleB,  padding: 8  },
                    { type: address, semantic: AddressMXScaleA,  padding: 8  },
                    { type: uint32,  semantic: StrideScaleB0,    padding: 12 },
                    { type: uint32,  semantic: StrideScaleB1,    padding: 12 },
                    { type: uint32,  semantic: StrideScaleA0,    padding: 12 },
                    { type: uint32,  semantic: StrideScaleA1,    padding: 12 },
                    { type: uint32,  semantic: SplitK,           padding: 12 } ]
            macrotile: [256, 256, 256]
            padProblemSizeToTile: [true, true] # M, N
            threads: [256, 1, 1]
            grid: [TilesX, TilesY, One]
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 8, 8, 2, 2] # 256 x 256
        - PreloadKernArgs: [False]
        - DepthU: [256]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - TransposeLDS: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - StaggerU: [16]
        - StaggerUStride: [-1]
        - WorkGroupMapping: [1]
        - StaggerUMapping: [0]
        - 1LDSBuffer: [-1]
        - WorkGroupMappingXCC: [8]
        - WorkGroupMappingXCCGroup: [-1]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - GlobalReadPerMfma: [1]
        - LocalWritePerMfma: [-1]
        - StoreRemapVectorWidth: [0]
        - StoreVectorWidth: [-1]
        - SourceSwap: [1]
        - NumElementsPerBatchStore: [16]
        - ClusterLocalRead: [1]
        - NonTemporalA: [0]
        - NonTemporalB: [0]
        - DirectToVgprA: [1]
        - DirectToVgprB: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 8192]

LibraryLogic:
    ScheduleName: "gfx950"
    DeviceNames: ["Device 0049", "Device 0050"]
    ArchitectureName: "gfx950"
    LibraryType: "GridBased"
