                    { type: int32, semantic: Expression }, # MagicShifts_31 = MagicShifts(Convert(ArithmeticShiftR(Tensor_0_size_1_21:I64, 6:U32)I64)U32) 
                    { type: uint32, semantic: Expression }, # MagicMultiple_3 = MagicMultiple(numTiles1) 
                    { type: uint32, semantic: Expression, expression: floor((((SizeFree1) + 64) - 1) / 64) }, # numTiles1
