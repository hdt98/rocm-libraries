TestParameters:
  marks: [skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported yet

GlobalParameters:
  MinimumRequiredVersion: 5.0.0
  SleepPercent: 50
  NumElementsToValidate: -1
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeA: 3
  DataInitTypeB: 3
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  ValidateMetadata: True

BenchmarkProblems:
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 0
      Activation: False
      UseScaleAlphaVec: 0

    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - CustomKernel:
          - name: "RRGEMM_TN_half_half_half_half_float_WGTS64x64x64_WGS128x2_WGMXCC0_LABufferToLDS_LBBufferToLDS_SD1_LSABufferToVGPR_LSBBufferToVGPR_UNROLL0x0_SwizzleScale00_SwizzleTileSize0x0X0x0_PF4x1m1_M_98fd6c3c16c08d0e"
            args: [ { type: int64, semantic: StrideA1 },
                    { type: address, semantic: AddressA },
                    { type: int64, semantic: StrideB1 },
                    { type: address, semantic: AddressB },
                    { type: int64, semantic: StrideC1 },
                    { type: address, semantic: AddressC },
                    { type: float32, semantic: Alpha },
                    { type: float32, semantic: Beta },
                    { type: int64, semantic: StrideA0 },
                    { type: int64, semantic: SizeSum },
                    { type: int64, semantic: StrideB0 },
                    { type: int64, semantic: StrideC0 },
                    { type: int64, semantic: StrideD0 },
                    { type: int64, semantic: StrideD1 },
                    { type: address, semantic: AddressD } ]
            macrotile: [64, 64, 64]
            threads: [256, 1, 1]
            grid: [TilesX, TilesY, Batch]
        - MatrixInstruction:
          - [16,16,16, 1, 1, 2,2, 2,2]
        - PreloadKernArgs: [False]
        - DepthU: [64]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - TransposeLDS: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - StaggerU: [16]
        - StaggerUStride: [-1]
        - WorkGroupMapping: [1]
        - StaggerUMapping: [0]
        - 1LDSBuffer: [-1]
        - WorkGroupMappingXCC: [8]
        - WorkGroupMappingXCCGroup: [-1]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - GlobalReadPerMfma: [1]
        - LocalWritePerMfma: [-1]
        - StoreRemapVectorWidth: [0]
        - StoreVectorWidth: [-1]
        - SourceSwap: [1]
        - NumElementsPerBatchStore: [16]
        - ClusterLocalRead: [1]
        - NonTemporalA: [0]
        - NonTemporalB: [0]
        - DirectToVgprA: [1]
        - DirectToVgprB: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [2048, 4096, 1, 1024]

LibraryLogic:
    ScheduleName: "aquavanjaram"
    DeviceNames: ["Device 0049", "Device 0050"]
    ArchitectureName: "gfx942"
    LibraryType: "GridBased"
