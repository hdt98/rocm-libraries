TestParameters:
  marks: [skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported yet

GlobalParameters:
  MinimumRequiredVersion: 5.0.0
  SleepPercent: 50
  NumElementsToValidate: -1
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeA: 3
  DataInitTypeB: 3
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  ValidateMetadata: True

BenchmarkProblems:
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 0
      Activation: False
      UseScaleAlphaVec: 0

    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - CustomKernel:
          - name: "c_ck_gemm_basic_hip_amdgcn_amd_amdhsa_gfx942"
            args: [ { type: address, semantic: AddressB },
                    { type: address, semantic: AddressA },
                    { type: address, semantic: AddressD },
                    { type: address, semantic: AddressD },
                    { type: uint32, semantic: SizeFree1 },
                    { type: uint32, semantic: SizeFree0 },
                    { type: uint32, semantic: SizeSum },
                    { type: uint32, semantic: StrideB0 },
                    { type: uint32, semantic: StrideA0 },
                    { type: uint32, semantic: StrideD0 },
                    { type: uint32, semantic: StrideD0 },
                    { type: uint32, semantic: SizeFree2 },
                    { type: uint32, semantic: Padding },
                    { type: uint32, semantic: Padding },
                    { type: uint32, semantic: Padding },
                    { type: uint32, semantic: Padding },
                    { type: uint32, semantic: Padding },
                    { type: uint32, semantic: Padding } ]
            macrotile: [256, 256, 64]
            threads: [256, 1, 1]
            grid: [TilesXYBatch, One, One]
        - MatrixInstruction:
          - [32, 32, 8, 1, 1, 4, 4, 2, 2]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [2048, 4096, 1, 1024]

LibraryLogic:
    ScheduleName: "aquavanjaram"
    DeviceNames: ["Device 0049", "Device 0050"]
    ArchitectureName: "gfx942"
    LibraryType: "GridBased"
