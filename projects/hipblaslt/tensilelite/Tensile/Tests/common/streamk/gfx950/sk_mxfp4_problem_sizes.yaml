TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: True
  CpuThreads: 32
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  PrintLevel: 2
  PrintSolutionRejectionReason: True
  ForceGenerateKernel: True
  MaxWorkspaceSize: 134217728

BenchmarkProblems:
  #######################################
  # Test Various Problem Sizes (M, N, K)
  # Small, Medium, Large, Irregular, Non-square
  # With StreamK mode 3 (DP-before-SK)
  # TN transpose only
  #######################################
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: F4
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: True
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 32
      MXBlockB: 32

    - # Test various problem sizes
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 4, 4, 2, 2]
        - DepthU: [128]
        - TransposeLDS: [-1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - LdsPadMetadata: [0]
        - LDSTrInst: [True]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [0]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [0]
        - GlobalReadVectorWidthA: [32]
        - GlobalReadVectorWidthB: [32]
        - ExpandPointerSwap: [0]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - DirectToVgprSparseMetadata: [0]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - StaggerU: [0]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [64]
        - WorkGroupMapping: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # Small square
          - Exact: [64, 64, 1, 512]
          - Exact: [128, 128, 1, 512]
          - Exact: [128, 128, 1, 1024]
          # Medium square
          - Exact: [256, 256, 1, 512]
          - Exact: [256, 256, 1, 1024]
          - Exact: [256, 256, 1, 2048]
          - Exact: [512, 512, 1, 512]
          - Exact: [512, 512, 1, 1024]
          - Exact: [512, 512, 1, 2048]
          # Large square
          - Exact: [1024, 1024, 1, 512]
          - Exact: [1024, 1024, 1, 1024]
          - Exact: [1024, 1024, 1, 2048]
          - Exact: [2048, 2048, 1, 1024]
          # Non-square: M > N
          - Exact: [512, 256, 1, 1024]
          - Exact: [1024, 256, 1, 1024]
          - Exact: [1024, 512, 1, 1024]
          - Exact: [2048, 512, 1, 1024]
          - Exact: [2048, 1024, 1, 1024]
          # Non-square: N > M
          - Exact: [256, 512, 1, 1024]
          - Exact: [256, 1024, 1, 1024]
          - Exact: [512, 1024, 1, 1024]
          - Exact: [512, 2048, 1, 1024]
          - Exact: [1024, 2048, 1, 1024]
          # Irregular sizes (not power of 2)
          - Exact: [127, 127, 1, 1024]
          - Exact: [255, 255, 1, 1024]
          - Exact: [263, 263, 1, 1024]
          - Exact: [511, 511, 1, 2048]
          - Exact: [519, 519, 1, 2080]
          # Irregular non-square
          - Exact: [263, 519, 1, 1024]
          - Exact: [519, 263, 1, 2080]
          - Exact: [511, 1023, 1, 2048]
          # Very large K
          - Exact: [256, 256, 1, 4096]
          - Exact: [512, 512, 1, 4096]
          - Exact: [128, 128, 1, 8192]
        - ActivationArgs:
          - [Enum: none]
