TestParameters:
  marks: [xfail-gfx950, skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: True
  CpuThreads: 32
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  PrintLevel: 2
  PrintSolutionRejectionReason: True
  ForceGenerateKernel: True
  MaxWorkspaceSize: 134217728

BenchmarkProblems:
  #######################################
  # Test GroupedGemm with Batch Size Combinations
  # Batch: 1, 2, 4, 8
  # GroupedGemm: True
  # TN transpose only
  #######################################
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: F4
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: True
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 32
      MXBlockB: 32
      GroupedGemm: True

    - # GroupedGemm + Batch combinations
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 4, 4, 2, 2]
        - DepthU: [128]
        - TransposeLDS: [-1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - LdsPadMetadata: [0]
        - LDSTrInst: [True]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [0]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [0]
        - GlobalReadVectorWidthA: [32]
        - GlobalReadVectorWidthB: [32]
        - ExpandPointerSwap: [0]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - DirectToVgprSparseMetadata: [0]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - StaggerU: [0]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [64]
        - WorkGroupMapping: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # Batch=1
          - Exact: [256, 256, 1, 1024]
          - Exact: [512, 512, 1, 1024]
          # Batch=2
          - Exact: [256, 256, 2, 1024]
          - Exact: [512, 512, 2, 1024]
          # Batch=4
          - Exact: [256, 256, 4, 1024]
          - Exact: [512, 512, 4, 512]
          # Batch=8
          - Exact: [256, 256, 8, 512]
          - Exact: [512, 512, 8, 512]
        - ActivationArgs:
          - [Enum: none]
