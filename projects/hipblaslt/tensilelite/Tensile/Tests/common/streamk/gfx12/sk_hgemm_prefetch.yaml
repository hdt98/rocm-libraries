TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1250] # gfx1201 only

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  MaxWorkspaceSize: 134217728
  NumWarmups: 0
  EnqueuesPerSync: 1
  SleepPercent: 50

BenchmarkProblems:

  - # HGEMM NT - baseline (PAP=0)
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # HGEMM NT - StreamK without PrefetchAcrossPersistent
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - WavefrontSize: [32]
        - 1LDSBuffer: [0]
        - DepthU: [64]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - GlobalSplitU: [0]
        - MatrixInstruction:
          - [16, 16, 16, 1, 1, 8, 8, 2, 2]
        - MIArchVgpr: [0]
        - PrefetchAcrossPersistent: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - StreamK: [3]
        - StreamKFixupTreeReduction: [0]
        - StaggerU: [0]
        - TransposeLDS: [0]
        - WorkGroupMapping: [1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [512, 512, 1, 512]
          - Exact: [2055, 2055, 1, 1031]

  - # HGEMM NT - PrefetchAcrossPersistent enabled (PAP=1)
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # HGEMM NT - StreamK with PrefetchAcrossPersistent
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - WavefrontSize: [32]
        - 1LDSBuffer: [0]
        - DepthU: [64]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - GlobalSplitU: [0]
        - MatrixInstruction:
          - [16, 16, 16, 1, 1, 8, 8, 2, 2]
        - MIArchVgpr: [0]
        - PrefetchAcrossPersistent: [1]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - StreamK: [3]
        - StreamKFixupTreeReduction: [0]
        - StaggerU: [0]
        - TransposeLDS: [0]
        - WorkGroupMapping: [1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [512, 512, 1, 512]
          - Exact: [2055, 2055, 1, 1031]
