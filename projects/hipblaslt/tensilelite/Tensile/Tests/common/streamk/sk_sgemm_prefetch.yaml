TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # gfx942 only

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: True
  CpuThreads: 32
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  MaxWorkspaceSize: 134217728
  NumWarmups: 2
  EnqueuesPerSync: 1
  NumBenchmarks: 10
  SleepPercent: 50

BenchmarkProblems:

  - # SGEMM NT - baseline (PAP=0)
    - # ProblemType
      OperationType: GEMM
      DataType: s
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # SGEMM NT - StreamK without PrefetchAcrossPersistent
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - StreamK: [3]
        - GlobalSplitU: [0]
        - WavefrontSize: [64]
        - DepthU: [16]
        - 1LDSBuffer: [0]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [4]
        - GlobalReadVectorWidthB: [4]
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 4,4, 2,2]
        - MIArchVgpr: [0]
        - PrefetchAcrossPersistent: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - StoreVectorWidth: [4]
        - TransposeLDS: [0]
        - VectorWidthA: [4]
        - VectorWidthB: [4]
        - WorkGroupMapping: [1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 4096]
          - Exact: [4096, 8192, 1, 4096]
          - Exact: [4096, 4096, 1, 8192]

  - # SGEMM NT - PrefetchAcrossPersistent enabled (PAP=1)
    - # ProblemType
      OperationType: GEMM
      DataType: s
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # SGEMM NT - StreamK with PrefetchAcrossPersistent
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - StreamK: [3]
        - GlobalSplitU: [0]
        - WavefrontSize: [64]
        - DepthU: [16]
        - 1LDSBuffer: [0]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [4]
        - GlobalReadVectorWidthB: [4]
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 4,4, 2,2]
        - MIArchVgpr: [0]
        - PrefetchAcrossPersistent: [1]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - StoreVectorWidth: [4]
        - TransposeLDS: [0]
        - VectorWidthA: [4]
        - VectorWidthB: [4]
        - WorkGroupMapping: [1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 4096]
          - Exact: [4096, 8192, 1, 4096]
          - Exact: [4096, 4096, 1, 8192]
