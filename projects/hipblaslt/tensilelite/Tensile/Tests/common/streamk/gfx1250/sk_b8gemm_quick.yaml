TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  CpuThreads: 32
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  MaxWorkspaceSize: 134217728
  PrintSolutionRejectionReason: True
  ISA: [[12, 5, 0]]

BenchmarkProblems:
  - # B8B8S NT
    -
      OperationType: GEMM
      DataType: B8
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      TransposeA: 0
      TransposeB: 1
      UseBeta: True
      Batched: True
    -
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - 1LDSBuffer: [-1]
        - ClusterLocalRead: [1]
        - DepthU: [64]
        - ExpandPointerSwap: [1]
        - GlobalReadPerMfma: [1]
        - GlobalReadVectorWidthA: [4]
        - GlobalReadVectorWidthB: [4]
        - InnerUnroll: [1]
        - MatrixInstruction:
          - [16, 16, 64, 1, 1, 1,1, 1,2]
          - [16, 16, 64, 1, 1, 1,1, 2,1]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LocalWritePerMfma: [-1]
        - NumElementsPerBatchStore: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - StaggerU: [32]
        - StorePriorityOpt: [0]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - TransposeLDS: [0]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - WavefrontSize: [32]
        - WaveSeparateGlobalReadB: [1]
        - WorkGroupMapping: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 1024]
          - Exact: [128, 128, 1, 1024]
          - Exact: [129, 129, 1, 1024]
          - Exact: [511, 511, 1, 1024]
          - Exact: [512, 512, 1, 1024]
          - Exact: [513, 513, 1, 1024]

  - # B8B8S TN
    -
      OperationType: GEMM
      DataType: B8
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
