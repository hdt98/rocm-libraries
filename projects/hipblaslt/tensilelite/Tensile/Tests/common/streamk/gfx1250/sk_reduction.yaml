TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  CpuThreads: 32
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  MaxWorkspaceSize: 134217728
  NumWarmups: 0
  EnqueuesPerSync: 1
  SleepPercent: 50
  ISA: [[12, 5, 0]]

BenchmarkProblems:
  - # Large-k test
    - # HHS NT
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # Grid
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ['Assembly']
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 4,4, 1,2]
        - 1LDSBuffer: [-1]
        - DepthU: [32]
        - ExpandPointerSwap: [0]
        - GlobalReadVectorWidthA: [4]
        - GlobalReadVectorWidthB: [8]
        - LocalReadVectorWidth: [8]
        - MIArchVgpr: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StaggerU: [0]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - StreamKFixupTreeReduction: [0, 1]
        - TransposeLDS: [0]
        - UseSgprForGRO: [0]
        - WavefrontSize: [32]
        - WorkGroupMapping: [6]
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 4096]
          - Exact: [512, 256, 1, 4096]
          - Exact: [256, 512, 1, 4096]
          - Exact: [263, 263, 1, 4103]
