TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  #PrintSolutionRejectionReason: True
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 13
  DataInitTypeB: 12
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeBias: 13
  DataInitTypeScaleAlphaVec: 12
  #MaxFileName: 256

BenchmarkProblems:
  ########################################
  # HHS TN DTVA + BIAS + Activation
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 1
      Activation: True
      UseScaleAlphaVec: 1
      UseScaleAB: "Scalar"
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 16, 1,  1,   1, 1,  4,1 ] # MT = 64x16. Case to check kernel writer works
        - WorkGroup:
          - [16,16,1]
        - GlobalReadVectorWidthA: [2,4,8]
        - GlobalReadVectorWidthB: [2,4,8]
        - PrefetchGlobalRead: [0,1,2]
        - PrefetchLocalRead: [1,2]
        - ClusterLocalRead: [1]
        - NumElementsPerBatchStore: [0]
        - DepthU: [32,64,128]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - MIArchVgpr: [0, 1]
        - LocalWritePerMfma: [-1]
        - StaggerU: [4]
        - StaggerUStride: [256]
        - StaggerUMapping: [2]
        - WorkGroupMapping: [1]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - StorePriorityOpt: [0]
        - VectorStore: [-1]
        - StoreSyncOpt: [0]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [1]
        #- GlobalSplitU: [1,2]
        #- GlobalSplitUAlgorithm: ["MultipleBuffer", "MultipleBufferSingleKernel"]
        - SourceSwap: [0, 1]
        - LocalReadVectorWidth: [2,4,8]
        - DirectToVgprA: [1]
        - UseSgprForGRO: [0,1]
        - TransposeLDS: [0,1]
        - ActivationFuncCall: [0, 1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256,   257, 1, 1101]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: relu]
