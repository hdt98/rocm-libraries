TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  BoundsCheck: 2
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840

BenchmarkProblems:
  ########################################
  # F32 NT
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: S
      DestDataType: S
      ComputeDataType: S
      TransposeA: 0
      TransposeB: 1
      UseBeta: True
      Batched: True
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 1, 1, 1, 1]
          - [16, 16, 4, 1, 1, 2, 2, 2, 2]
          - [16, 16, 4, 1, 1, 3, 3, 2, 2]
          - [16, 16, 4, 1, 1, 5, 3, 2, 2]
          - [16, 16, 4, 1, 1, 7, 7, 2, 2]
        - DepthU: [ 32 ]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [0]
        - SourceSwap: [1]
        - PrefetchGlobalRead: [1,2]
        - PrefetchLocalRead: [1]
        - GlobalReadVectorWidthA: [1, 4]
        - GlobalReadVectorWidthB: [1, 4]
        - LocalReadVectorWidth: [1, 4]
        - ScheduleIterAlg: [3]
        - StaggerU: [0]
        - TailloopInNll: [0, 1]
        - StreamK: [0,3]
        - DirectToLds: [1, 2, 3]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[1,67,300], [1,93,300], [1], [1,76,192]]

