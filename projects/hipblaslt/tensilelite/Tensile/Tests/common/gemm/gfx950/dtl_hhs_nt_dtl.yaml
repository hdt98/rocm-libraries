TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  BoundsCheck: 2
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840

BenchmarkProblems:
  ########################################
  # HHS NT DTL
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 0
      TransposeB: 1
      UseBeta: True
      UseBias: 0 # 1
      Batched: True
      Activation: False
      ActivationHPA: False
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          #- [32, 32, 16, 1, 1, 2, 2, 2, 2 ]
          - [16, 16, 32, 1, 1, 8, 2, 4, 1 ]
          - [32, 32, 16, 1, 1, 4, 4, 2, 2 ]
          - [16, 16, 32, 1, 1, 1, 1, 2, 2 ]
          - [16, 16, 32, 1, 1, 2, 3, 2, 2 ]
          - [32, 32, 16, 1, 1, 3, 2, 2, 2 ]
        - PrefetchGlobalRead: [1, 2]
        - PrefetchLocalRead: [1, 2]
        - DepthU: [64]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        #- TransposeLDS: [1] #0,1
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - DirectToLds: [1, 2, 3]
        - DirectToVgprA: [0,1]
        - AssertSummationElementMultiple: [1, 2]
        - LdsPadA: [0, 8]
        - LdsPadB: [0, 8]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1, 2]
        - SourceSwap: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 64]
          - Exact: [256, 256, 1, 128]
          - Exact: [256, 256, 1, 256]
          - Exact: [256, 256, 1, 512]
          - Range: [[65], [123], [1], [1,123,192]]
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 8, 8, 2, 2 ]
          - [16, 16, 32, 1, 1, 8, 7, 2, 2 ]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - DepthU: [64]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - DirectToLds: [1, 2, 3]
        - AssertSummationElementMultiple: [1, 2]
        - LdsPadA: [0, 8]
        - LdsPadB: [0, 8]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1]
        - SourceSwap: [1]
        - LDSTrInst: [0,1]
        - TailloopInNll: [0, 1]
        - StreamK: [0,3]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[65], [123], [1], [1,123,192]]
    - # Check DTL for load width less than 32bits
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 1, 1, 2, 2 ]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - DepthU: [64]
        - ScheduleIterAlg: [3]
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [1]
        - GlobalReadVectorWidthB: [1]
        - DirectToLds: [0, 1]
        - LdsPadA: [0, 8]
        - LdsPadB: [0, 8]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1]
        - SourceSwap: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[65], [123], [1], [1,63,192]]
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [32, 32, 16, 1, 1, 4, 4, 2, 2 ]
          - [16, 16, 32, 1, 1, 8, 8, 2, 2 ]
        - PrefetchGlobalRead: [1, 2]
        - PrefetchLocalRead: [1, 2]
        - DepthU: [64]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - DirectToLds: [1, 2, 3]
        - AssertSummationElementMultiple: [1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1]
        - SourceSwap: [1]
        - SwapGlobalReadOrder: [0, 1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
