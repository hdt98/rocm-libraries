TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  BoundsCheck: 2
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840

BenchmarkProblems:
  ########################################
  # F8F8S TT DTL
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: f8
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 1
      UseBeta: True
      Batched: True
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,   1, 1,  1,1 ]
          - [32, 32, 64, 1,  1,   1, 1,  1,1 ]
          - [16, 16, 128, 1,  1,   4, 4,  2,2 ]
          - [32, 32, 64, 1,  1,   2, 2,  2,2 ]
          - [32, 32, 64, 1,  1,   3, 2,  2,2 ]
          - [32, 32, 64, 1,  1,   2, 3,  2,2 ]
          - [16, 16, 128, 1,  1,   3, 2,  2,2 ]
          - [16, 16, 128, 1,  1,   2, 3,  2,2 ]
        - WorkGroup:
          - [16,16,1]
        - GlobalReadVectorWidthA: [4, 16]
        - GlobalReadVectorWidthB: [4, 16]
        - PrefetchGlobalRead: [1,2]
        - PrefetchLocalRead: [1,2]
        - ClusterLocalRead: [1]
        - NumElementsPerBatchStore: [0]
        - DepthU: [128]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - MIArchVgpr: [0]
        - LocalWritePerMfma: [-1]
        - StaggerU: [4]
        - StaggerUStride: [256]
        - WorkGroupMapping: [1]
        - ScheduleIterAlg: [3]
        - StorePriorityOpt: [0]
        - VectorStore: [-1]
        - StoreSyncOpt: [0]
        - LdsPadA: [-1, 0, 8]
        - LdsPadB: [-1, 0, 8]
        - 1LDSBuffer: [0]
        - GlobalSplitU: [1,2]
        - SourceSwap: [1]#[0, 1]
        - LocalReadVectorWidth: [8]
        - DirectToLds: [1, 2]
        - AssertSummationElementMultiple: [1, 4]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[19], [19], [1], [1,3,12]]
          - Range: [[31], [31], [1], [1,7,72]]
          - Range: [[127], [127], [1], [128,4,140]]
          - Range: [[13],   [17], [1], [258, 3, 384]]
          - Exact: [256, 256, 1, 64]
          - Exact: [256, 256, 1, 128]
          - Exact: [256, 256, 1, 320]

