TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  #MinimumRequiredVersion: 4.14.0
  SleepPercent: 50
  NumElementsToValidate: -1
  NumWarmups: 1
  EnqueuesPerSync: 1
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeA: 3
  DataInitTypeB: 3
  NewClient: 2
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  RotatingBufferSize: 512
  DeviceLDS: 163840
  MaxLDS: 163840
  PrintSolutionRejectionReason: True

BenchmarkProblems:

  ########################################
  # SSX TN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: S
      DestDataType: S
      F32XdlMathOp: X
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 4, 8, 2, 2]
        - DepthU: [32]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [0]
        - SourceSwap: [1]
        - ClusterLocalRead: [1]
        - ExpandPointerSwap: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - GlobalReadVectorWidthA: [4]
        - GlobalReadVectorWidthB: [4]
        - LocalReadVectorWidth: [-1]
        - UseCustomMainLoopSchedule: [1]
        - ScheduleIterAlg: [3]
        - TransposeLDS: [1] #0,1
        - StaggerU: [0]
        - StreamK: [3]
        - DirectToLds: [1]
        - UseSgprForGRO: [0]
        - NonTemporalA: [4]
        - NonTemporalC: [4]
        - NonTemporalD: [4]
        - NumElementsPerBatchStore: [16]
        - WorkGroupMapping: [8]
        - WorkGroupMappingXCC: [-1]
        - StoreVectorWidth: [4]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[128], [256], [1], [64, 64, 256]]
          - Range: [[128], [256], [1], [1,1,64]]
          - Range: [[128], [256], [1], [32, 64, 256]]
        - BiasTypeArgs: ['b']