TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

#######################################################################
# Subtile path — MXFP4 (F4) — TAIL-LOOP variant
#
# K is restricted to multiples of 32 (the MX ASEM target post-Phase-2)
# but NOT multiples of DepthU. Every problem here exercises the subtile
# tail loop. MIK = 128 for FP4, so K_rem partitions into:
#
#   - Partial-MFMA cases (K_rem < 128 or K_rem & 127 != 0):
#       K_rem ∈ {32, 64, 96, 160, 192, 224, ...}
#     → tail iter does 1 (or 2) MFMAs, the last of which only
#       accumulates the trailing K_rem mod 128 lanes; remaining
#       MFMA input lanes must be lane-masked to 0.
#
#   - Full-last-MFMA cases (K_rem mod 128 == 0):
#       K_rem ∈ {128, 256}
#     → tail iter does N full MFMAs over valid lanes; no partial-
#       MFMA masking needed (only SRD rewind).
#
# Both MX scale tensors (MXSA, MXSB) need the same SRD rewind +
# lane mask per-K-block (32 elements).
#######################################################################
GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeBias: 1
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  MXScaleFormat: 1
  BoundsCheck: 0
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840
  #PrintSolutionRejectionReason: True
  #GenerateSourcesAndExit: False
  CpuThreads: 1
  RotatingBufferSize: 0

BenchmarkProblems:
  ########################################
  # FP4 TN — no bias, DU = 2*MI_K = 256
  #
  # K-tail values cover both partial-MFMA (K_rem ∈ {32, 64, 96, 160,
  # 192, 224}) and full-last-MFMA (K_rem == 128) cases.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 2, 2,  1, 1]  # MT 32x32 (1x1 WG)
          - [16, 16, 128, 1,  1, 4, 4,  2, 2]  # MT 128x128
          - [16, 16, 128, 1,  1, 8, 8,  2, 2]  # MT 256x256
          - [16, 16, 128, 1,  1, 6, 4,  2, 2]  # MT 192x128 (asymmetric)
          - [16, 16, 128, 1,  1, 2, 6,  4, 1]  # MT 128x96  (4x1 WG)
        - PrefetchGlobalRead: [0, 1, 2]
        - PrefetchLocalRead: [0]
        - DepthU: [256]                 # 2*MI_K = 2*128
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [0, 3]
        - StaggerU: [0]
        - UseSubtileImpl: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # K_rem=32 (partial): single sub-MFMA's worth of K, mostly masked
          - Exact: [128, 128, 1,  32]
          - Exact: [256, 256, 1,  32]
          # K_rem=64 (partial): half a sub-MFMA
          - Exact: [128, 128, 1,  64]
          # K_rem=96 (partial): 3 of 4 K-blocks
          - Exact: [128, 128, 1,  96]
          - Exact: [256, 256, 1,  96]
          # K_rem=128 (full last MFMA, no partial): K = exactly 1 MIK
          - Exact: [128, 128, 1, 128]
          - Exact: [256, 256, 1, 128]
          # K_rem=160 (partial): 1 full + 1 partial sub-MFMA
          - Exact: [128, 128, 1, 160]
          # K_rem=192 (partial): 1 full + 2 partial K-blocks
          - Exact: [128, 128, 1, 192]
          # K_rem=224 (partial, near-full): 7 of 8 K-blocks
          - Exact: [128, 128, 1, 224]
          - Exact: [256, 256, 1, 224]
          # K = 1*DU + tail (main + tail combinations)
          - Exact: [128, 128, 1, 288]   # K = 256 + 32, 1 main + tail
          - Exact: [256, 256, 1, 384]   # K = 256 + 128, 1 main + full last MFMA
          - Exact: [128, 128, 1, 480]   # K = 256 + 224, near-DU tail
          # M,N edges with K-tail
          - Exact: [ 64,  64, 1,  96]   # M,N = 1*64 (FP4 granularity edge)
          - Exact: [192, 192, 1, 128]   # M,N = 3*64
          - Exact: [320, 320, 1,  64]   # M,N = 5*64
          # Non-multiple-of-32 M,N (multiples of 16) with tail K
          - Exact: [ 48,  48, 1,  96]
          - Exact: [112, 176, 1,  64]
          # Odd M,N with tail K
          - Exact: [ 17,  33, 1,  96]
          - Exact: [ 63,  63, 1,  32]
          # Batched
          - Exact: [128, 128, 2, 160]   # batch=2, partial-MFMA tail
          - Exact: [192, 192, 2,  96]   # batch=2, M,N edge

  ########################################
  # FP4 TN — large DU (DU = 512)
  #
  # Covers a representative subset of K-tail values that aren't
  # multiples of 512. Partial-MFMA tail (K_rem mod 128 != 0) and
  # full-last-MFMA tail (K_rem ∈ {128, 256, 384}).
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 4, 4,  2, 2]  # MT 128x128
          - [16, 16, 128, 1,  1, 8, 8,  2, 2]  # MT 256x256
          - [16, 16, 128, 1,  1, 6, 4,  2, 2]  # MT 192x128 (asymmetric)
        - PrefetchGlobalRead: [0, 1, 2]
        - PrefetchLocalRead: [0]
        - DepthU: [512]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [0, 3]
        - StaggerU: [0]
        - UseSubtileImpl: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # K_rem=32 (partial, smallest)
          - Exact: [128, 128, 1,  32]
          # K_rem=128 (full last MFMA, no partial)
          - Exact: [128, 128, 1, 128]
          # K_rem=256 (2 full last MFMAs)
          - Exact: [128, 128, 1, 256]
          - Exact: [256, 256, 1, 256]
          # K_rem=384 (3 full last MFMAs — full DU minus 128)
          - Exact: [128, 128, 1, 384]
          # K_rem=480 (near-DU, partial last MFMA)
          - Exact: [128, 128, 1, 480]
          # K = 1*DU + tail
          - Exact: [256, 256, 1, 544]   # K = 512 + 32

  ########################################
  # F4HS TN — bias epilogue, F16 output
  #
  # Minimal coverage to confirm tail loop composes with bias / F16
  # destination conversion.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
      UseBias: 1
      BiasDataTypeList: [s, h]

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 4, 4,  2, 2]  # MT 128x128
          - [16, 16, 128, 1,  1, 8, 8,  2, 2]  # MT 256x256
        - PrefetchGlobalRead: [0, 1, 2]
        - PrefetchLocalRead: [0]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [0, 3]
        - StaggerU: [0]
        - UseSubtileImpl: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1,  64]   # partial-MFMA tail with bias
          - Exact: [128, 128, 1, 128]   # full last MFMA tail with bias
          - Exact: [128, 128, 1, 224]   # partial-MFMA, near-full
        - BiasTypeArgs: ['s', 'h']
        - ActivationArgs:
          - [Enum: none]
          - [Enum: relu]

  ########################################
  # F4SS TN — F32 destination, no bias
  #
  # Minimal coverage with f32 dest to exercise the alternate epilogue.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 4, 4,  2, 2]  # MT 128x128
          - [16, 16, 128, 1,  1, 8, 8,  2, 2]  # MT 256x256
        - PrefetchGlobalRead: [0, 1, 2]
        - PrefetchLocalRead: [0]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [0, 3]
        - StaggerU: [0]
        - UseSubtileImpl: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1,  32]
          - Exact: [128, 128, 1, 128]
          - Exact: [256, 256, 1, 224]
          - Exact: [128, 128, 2,  96]   # batched

  ########################################
  # F4BS TN — bias epilogue, BF16 output
  #
  # Minimal coverage with bf16 dest + bias + activations.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
      UseBias: 1
      BiasDataTypeList: [s]

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 4, 4,  2, 2]  # MT 128x128
          - [16, 16, 128, 1,  1, 8, 8,  2, 2]  # MT 256x256
        - PrefetchGlobalRead: [0, 1, 2]
        - PrefetchLocalRead: [0]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [0, 3]
        - StaggerU: [0]
        - UseSubtileImpl: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1,  96]   # partial-MFMA tail with bias
          - Exact: [128, 128, 1, 160]   # partial-MFMA, mid-tail
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: none]
          - [Enum: relu]
          - [Enum: gelu]
