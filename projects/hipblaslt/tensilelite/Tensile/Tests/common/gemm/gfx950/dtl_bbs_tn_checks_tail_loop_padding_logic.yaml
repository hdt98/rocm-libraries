TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  BoundsCheck: 2
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840

BenchmarkProblems:
  ########################################
  # BBS TN - checks tail loop padding logic
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      ActivationFuncCall: True
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
           - [16, 16, 32, 1,  1, 2, 1,  4, 1 ]
           - [16, 16, 32, 1,  1, 2, 1,  2, 1 ]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [2] #0,1
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [2]
        - ClusterLocalRead: [0]#[0,1]
        - DirectToLds: [1, 2, 3]
        - StreamK: [3]
        - LdsPadA: [0] #[-1]
        - LdsPadB: [8] #[-1]
        - StaggerU: [0]
        - WorkGroupMapping: [16]
        - WorkGroupMappingXCC: [2]
        - 1LDSBuffer: [0]
        - NonTemporalD: [4]
        - SourceSwap: [1]
        - UseSgprForGRO: [0]
        - UseCustomMainLoopSchedule: [0]
        - LDSTrInst: [1]
        - VectorWidthA: [2]
        - VectorWidthB: [1]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - SwapGlobalReadOrder: [0, 1]
        - TailloopInNll: [0, 1]
        - WorkGroup:
           - [64, 4, 1]
           - [32, 4, 2]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1, 255]
