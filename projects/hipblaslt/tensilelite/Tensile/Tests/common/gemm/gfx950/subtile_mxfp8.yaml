TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250]

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeMXSA: 1
  DataInitTypeMXSB: 1
  MXScaleFormat: 1
  BoundsCheck: 0
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840
  CpuThreads: 1
  RotatingBufferSize: 0
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  ########################################
  # FP8 TN — PGR=0, DU = 1*MI_K = 128
  #
  # K must be a multiple of DU=128.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 8, 8,  2, 2]  # MT 256x256
        - PrefetchGlobalRead: [0]
        - PrefetchLocalRead: [0]
        - DepthU: [128]                 # 1*MI_K = 128
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 128]   # K = 1*DU
          - Exact: [512, 512, 1, 256]   # K = 2*DU
          - Exact: [256, 256, 1, 256]   # K = 2*DU

  ########################################
  # FP8 TN — PGR=2 (scheduler path), DU = 1*MI_K = 128
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 8, 8,  2, 2]  # MT 256x256
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - DepthU: [128]                 # 1*MI_K = 128
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 128]   # K = 1*DU
          - Exact: [512, 512, 1, 256]   # K = 2*DU
          - Exact: [256, 256, 1, 256]   # K = 2*DU
