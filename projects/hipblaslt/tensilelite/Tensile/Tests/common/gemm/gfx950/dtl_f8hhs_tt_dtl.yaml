TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  BoundsCheck: 2
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840

BenchmarkProblems:
  ########################################
  # F8HHS TT DTL
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DataTypeB: f8
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 1
      UseBeta: True
      UseBias: 0 # 1
      Batched: True
      Activation: False
      ActivationHPA: False
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [32, 32, 16, 1, 1, 4, 4, 2, 2 ]
          - [16, 16, 32, 1, 1, 8, 8, 2, 2 ]
          - [16, 16, 32, 1, 1, 1, 1, 2, 2 ]
          - [16, 16, 32, 1, 1, 2, 3, 2, 2 ]
          - [32, 32, 16, 1, 1, 3, 2, 2, 2 ]
        - PrefetchGlobalRead: [1, 2]
        - PrefetchLocalRead: [1, 2]
        - DepthU: [64]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [1] #0,1
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [16]
        - DirectToLds: [1, 2]
        - AssertSummationElementMultiple: [1, 2]
        - LdsPadA: [0, 8]
        - LdsPadB: [0, 8]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1, 2]
        - SourceSwap: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[63], [127], [1], [1,63,384]]

