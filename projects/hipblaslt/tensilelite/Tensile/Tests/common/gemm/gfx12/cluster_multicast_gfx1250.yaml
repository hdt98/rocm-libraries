TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: False
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # PrintTensorC: 1
  # PrintTensorD: 1
  # PrintTensorRef: 1
  NumWarmups: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: False
  MinKForGSU: 1
  Architecture: gfx1250
  CpuThreads: 1
  KeepBuildTmp: True
  PrintLevel: 2
  UseGPUTimer: False
  ROCmAgentEnumeratorPath: rocm_agent_enumerator
  ForceGenerateKernel: [True]
 
BenchmarkProblems:
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: F8
      MacDataTypeA: F8
      MacDataTypeB: F4
      DestDataType: F8
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      SupportUserArgs: True
        #      MXBlockA: 32
        #      MXBlockB: 32
        #      StochasticRounding: True
 
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,   1, 1,  4,1 ]  # 64x16
          - [16, 16, 128, 1,  1,   1, 1,  2,2 ]  # 32x32
        - DepthU: [256]
        - ClusterLocalRead: [0]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMXSA: [0]
        - LdsPadMXSB: [0]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsBlockSizePerPadMXSA: [0]
        - LdsBlockSizePerPadMXSB: [0]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - TDMInst: [3]
        - StaggerU: [0]
        - ScheduleIterAlg: [0]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [1]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - SourceSwap: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - ClusterDim: [[1, 1], [2, 2], [2, 3], [4, 2]]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [1280, 384, 1, 256]  # 1/2/4/5/10 x 1/2/3/4/6/12
