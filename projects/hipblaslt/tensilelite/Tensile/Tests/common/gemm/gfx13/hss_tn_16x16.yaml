TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported yet
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  PrintWinnersOnly: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  # DataInitValueActivationArgs: [0.5, -1]
  Architecture: gfx1300
  ISA: [[13,0,0]]
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeBias: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeScaleAlphaVec: 1
  PruneSparseMode: 1
  PrintTensorA: 0
  PrintTensorB: 0
  PrintTensorC: 0
  PrintTensorD: 0
  PrintTensorRef: 0
  # GenerateSourcesAndExit: True
  AMDGPUArchPath: rocm_agent_enumerator

BenchmarkProblems:
  #######################################
  # TN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      # Sparse: 1
      Batched: True
      Activation: False
      UseBias: 0

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
