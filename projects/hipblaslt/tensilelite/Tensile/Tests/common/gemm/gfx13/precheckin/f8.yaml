TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported yet
GlobalParameters:
  NumElementsToValidate: -1
  CpuThreads: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: False
  NumWarmups: 0
  SleepPercent: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: False
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  # DataInitValueActivationArgs: [0.5, -1]
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeBias: 0
  # Zero = 0, One = 1, Two = 2, Random = 3, NaN = 4, Inf = 5, BadInput = 6
  # BadOutput = 7, SerialIdx = 8, SerialDim0 = 9, SerialDim1 = 10, Identity = 11
  # TrigSin = 12, TrigCos = 13, TrigAbsSin = 14, TrigAbsCos = 15, RandomNarrow = 16
  # NegOne = 17, Max = 18, DenormMin = 19, DenormMax = 20, RandomNegPosLimited = 21
  # Free = 22, TrigIndSin = 23, TrigIndCos = 24, TrigIndAbsSin = 25, TrigIndAbsCos = 26, Count
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeScaleAlphaVec: 1
  PruneSparseMode: 1
  PrintTensorA: 0
  PrintTensorB: 0
  PrintTensorC: 0
  PrintTensorD: 0
  PrintTensorRef: 0
  KeepBuildTmp: False
  AsmDebug: False
  # GenerateSourcesAndExit: True
  ROCmAgentEnumeratorPath: rocm_agent_enumerator
  # Device: 1

BenchmarkProblems:
  #######################################
  # TN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: f8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      UseBias: 0

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 16, 1, 1, 4, 4, 2, 2]
          # - [16, 16, 16, 1, 1, 2, 4, 1, 2]
          - [16, 16, 32, 1, 1, 1, 2, 4, 1]
          # - [16, 16, 32, 1, 1, 8, 2, 4, 1]
          # - [16, 16, 64, 1, 1, 4, 4, 1, 1]
          - [16, 16, 64, 1, 1, 1, 1, 1, 1]
          - [16, 16, 64, 1, 1, 2, 1, 1, 2]
        - GlobalReadVectorWidthA: [4,8,16]
        - GlobalReadVectorWidthB: [8]
        - LocalReadVectorWidth: [4,8,16]
        - ClusterLocalRead: [1]
        - InnerUnroll: [1]
        - VectorWidthA: [1,4]
        - VectorWidthB: [2,8]
        - StoreVectorWidth: [1,4]
        - DepthU: [16,32,64]
        - WavefrontSize: [32]
        - TransposeLDS: [0,2]
        - SourceSwap: [0,1]
        # - LdsPadA: [0]
        # - LdsPadB: [0]
        # - LdsPadMetadata: [0]
        # - StaggerU: [0]
        - ScheduleIterAlg: [3] #[3]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [2]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        # - DirectToVgprA: [0,1]
        # - DirectToVgprB: [0,1]
        # - WaveSeparateGlobalReadA: [0,1]
        - StoreRemapVectorWidth: [0,4]
