TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported yet
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  PrintWinnersOnly: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  # DataInitValueActivationArgs: [0.5, -1]
  #Architecture: gfx1300
  ISA: [[13,1,0]]
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeBias: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeScaleAlphaVec: 1
  PruneSparseMode: 1
  PrintTensorA: 0
  PrintTensorB: 0
  PrintTensorC: 0
  PrintTensorD: 0
  PrintTensorRef: 0
  # GenerateSourcesAndExit: True
  ROCmAgentEnumeratorPath: rocm_agent_enumerator

BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      # Sparse: 1
      Batched: True
      Activation: False
      UseBias: 0

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 16, 1, 1, 1, 1, 1, 1]
          #- [16, 16, 16, 1, 1, 2, 2, 1, 1]
          #- [16, 16, 16, 1, 1, 1, 1, 2, 2]
        - GlobalReadVectorWidthA: [8] #[1,8]
        - GlobalReadVectorWidthB: [8] #[1,8]
        - LocalReadVectorWidth: [8]
        - VectorWidthA: [1] #[1,8]
        - VectorWidthB: [1] #[1,8]
        - StoreVectorWidth: [1]
        - DepthU: [32] #[16,32,64]
        - WavefrontSize: [32]
        - TransposeLDS: [-1] # [-1,0,1,2]
        - LDSTrInst: [True]
        # - SourceSwap: [0]
        - LdsPadA: [0]
        - LdsPadB: [0]
        # - LdsPadMetadata: [0]
        # - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [0] #[0,1,2]
        - ClusterLocalRead: [0] #[0,1]
        - PrefetchGlobalRead: [0] #[0,1,2]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        # - 1LDSBuffer: [0]
        # - DirectToVgprSparseMetadata: [0]
        # - WorkGroupMapping: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
