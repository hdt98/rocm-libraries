TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  BoundsCheck: 0
  KeepBuildTmp: True
  DeviceLDS: 163840
  MaxLDS: 163840
  GenerateSourcesAndExit: False
  CpuThreads: 1
  MXScaleFormat: 1
  NumWarmups: 100
  EnqueuesPerSync: 2000
  RotatingBufferSize: 512
  PrintSolutionRejectionReason: True

BenchmarkProblems:
   ########################################
  # #4: MT 256x256, MIWT=8x8, WG=[2x2]
  ########################################
  -
    - OperationType: GEMM
      DataType: F4
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 8, 8, 2, 2]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [0]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - TransposeLDS: [1]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        # - WorkGroupMapping: [4]
        - WorkGroupMapping: [16]
        - WorkGroupMappingXCC: [4]
        - NonTemporalD: [4]
        - UseSubtileImpl : [True]

      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 32768]
          # - Exact: [4096, 4096, 1, 65536]
          
