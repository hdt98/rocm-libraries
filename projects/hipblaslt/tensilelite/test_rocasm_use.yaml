        - 1LDSBuffer: [0]
        - SourceSwap: [1]
        - UseSgprForGRO: [0]
        - UseCustomMainLoopSchedule: [0]
        - MaxLDS: [163840]
        - GenerateROCasm: [False]
        - UseROCasmMainLoop: ["/tmp/rocasm_gen/1_BenchmarkProblems/Cijk_Alik_Bljk_BBS_BH_UserArgs_00/00_Final/source/build_tmp/SOURCE/assembly/Cijk_Alik_Bljk_BBS_BH_UserArgs_MT192x256x64_MI16Z_z1XWpIoP5Rzsoyup0Me3AlE7rIzbp-slH0kmsnd9U=_mainloop.py"]
