TestParameters:
  marks: [skip-gfx1100, skip-gfx1101, skip-gfx1102] # not supported yet

GlobalParameters:
  SleepPercent: 50
  NumElementsToValidate: -1
  NumBenchmarks: 1  # eqvlnt to iter for hipblaslt
  NumWarmups: 20 # eqvlnt to cold-iter for hipblaslt
  EnqueuesPerSync: 1000
  DataInitTypeA: 12 # TrigSin (problem dependant)
  DataInitTypeB: 13 # TrigCos (problem dependant)
  DataInitTypeBeta: 0 # Zeros
  DataInitTypeAlpha: 1 # Ones
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  PrintSolutionRejectionReason: True
  KeepBuildTmp: True
  ClientLogLevel: 3 # Debug level - includes rejection reasons
  KernelTime: True
  BoundsCheck: 2
  # NewClient: 2
  # DeviceLDS: 163840
  # MaxLDS: 163840
  # RotatingBufferSize: 512
  # ForceGenerateKernel: 1
  # GenerateSourcesAndExit: True

BenchmarkProblems:
  ########################################
  # TN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1 # T
      TransposeB: 0 # N
      UseBeta: True
      Batched: True
      UseBias: 1
      BiasDataTypeList: [s,b]
      UseScaleAlphaVec: 1
      Activation: true
      ActivationType: hipblaslt_all
      ActivationFuncCall: true
      # ActivationHPA: True
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:          
          - [
             # M x N x K x B
             # MxNxKxB specifies matrix instruction variants
             #  MxNxB determines the shape of the C tile each instruction worked on
             #      K determines the unroll depth
             16,16,32,1,
             # MIBlockM
             1,    # how many blocks along M dimension for multi-block MI variant
             # WaveTileM x WaveTileN
             6,8,  # dimensions of the C tile each wave works on
             # WaveM x WaveN
             2,2   # Wave shape
            ]
        - PrefetchGlobalRead: [2] # PGR=2 is not supported with DTL
        - PrefetchLocalRead: [1]
        - DepthU: [64]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [1] # 0: NT, 1: NN, TT, TN
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8] # [2,4,8]
        - StreamK: [3]
        - LdsPadA: [-1] #[-1]
        - LdsPadB: [-1] #[-1]
        - StaggerU: [0]
        # - WorkGroupMapping: [16]
        # - WorkGroupMappingXCC: [2]
        - 1LDSBuffer: [0]
        - NonTemporalD: [4]
        - SourceSwap: [1]
        - UseSgprForGRO: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [768, 1024, 1, 1024]
        - BiasTypeArgs: ['b']

LibraryLogic:
    ScheduleName: "gfx942"
    ArchitectureName: "gfx942"
