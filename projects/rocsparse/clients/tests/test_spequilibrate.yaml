---
include: rocsparse_common.yaml


Definitions:
  - &M_N_range_quick
    - { M:  50, N:  50 }
    - { M: 187, N: 187 }

  - &M_N_range_checkin
    - { M:   0, N:   0 }
    - { M:  79, N:  79 }
    - { M: 361, N: 361 }

  - &M_N_range_nightly
    - { M:   9381, N:   9381 }
    - { M:  37017, N:  37017 }

Tests:
- name: spequilibrate_bad_arg
  category: pre_checkin
  function: spequilibrate_bad_arg
  precision: *single_double_precisions_complex_real
  indextype: *i32

- name: spequilibrate
  category: quick
  function: spequilibrate
  precision: *single_double_precisions_complex_real
  M_N: *M_N_range_quick
  baseA: *all_rocsparse_index_base
  matrix: [rocsparse_matrix_random]
  indextype: *i32

- name: spequilibrate
  category: quick
  function: spequilibrate
  precision: *single_double_precisions_complex_real
  M_N: *M_N_range_quick
  baseA: *all_rocsparse_index_base
  matrix: [rocsparse_matrix_random]
  indextype: *i64

- name: spequilibrate
  category: pre_checkin
  function: spequilibrate
  precision: *single_double_precisions_complex_real
  M_N: *M_N_range_checkin
  baseA: *all_rocsparse_index_base
  matrix: [rocsparse_matrix_random]
  indextype: *i32i32_i64i32_i64i64

- name: spequilibrate
  category: nightly
  function: spequilibrate
  precision: *single_double_precisions_complex_real
  M_N: *M_N_range_nightly
  baseA: *all_rocsparse_index_base
  matrix: [rocsparse_matrix_random]
  indextype: *i32i32_i64i32_i64i64

- name: spequilibrate_file
  category: quick
  function: spequilibrate
  precision: *single_double_precisions
  M: 1
  N: 1
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_file_rocalution]
  filename: [nos1]
  indextype: *i32

- name: spequilibrate_file
  category: nightly
  function: spequilibrate
  precision: *single_double_precisions
  M: 1
  N: 1
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_file_rocalution]
  filename: [nos1,
             nos2,
             nos3,
             nos5,
             nos7]
  indextype: *i32i32_i64i32_i64i64

- name: spequilibrate_extra
  category: pre_checkin
  function: spequilibrate_extra
