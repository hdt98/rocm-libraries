# rocFFT Test Categories Configuration
# This file defines test categories for selective test execution with CTest
test_categories:
  level1:
    description: "Power-of-X FFT tests"
    test_patterns:
      - "*pow2_1D*"
      - "*offset_pow2_1D*"
      - "*pow2_2D*"
      - "*offset_pow2_2D*"
      - "*pow2_3D*"
      - "*offset_pow2_3D*"
      - "*prime_1D*"
      - "*offset_prime_1D*"
      - "*mix_1D*"
      - "*offset_mix_1D*"
      - "*radX_1D*"
      - "*pow3_1D*"
      - "*pow5_1D*"
    test_files:
      - "tests/accuracy_test_1D.cpp"
      - "tests/accuracy_test_2D.cpp"
      - "tests/accuracy_test_3D.cpp"
    labels:
      - "level1"
      - "accuracy"

  level2:
    description: "Callback function and hermitian tests" 
    test_patterns:
      - "*callback*"
      - "*scaling*"
      - "*hermitian*"
      - "*real_to_complex*"
      - "*complex_to_real*"
    test_files:
      - "tests/accuracy_test_callback.cpp"
      - "tests/callback_change_type.cpp"
      - "tests/default_callbacks_test.cpp"
      - "tests/hermitian_test.cpp"
    labels:
      - "level2"
      - "advanced"

  level3:
    description: "Unit tests and Adhoc"
    test_patterns:
      - "*unit_test*"
      - "*rocfft_UnitTest*"
      - "*adhoc*"
      - "*offset_adhoc*"
    test_files:
      - "tests/unit_test.cpp"
      - "tests/buffer_hash_test.cpp"
      - "tests/validate_length_stride.cpp"
      - "accuracy_test_adhoc.cpp"
    exclude:
      - "*multithread*"
      - "*multi_device*"
    labels:
      - "unit_test"
      - "level3"

  level4:
    description: "Performance, mpi and emulation tests"
    test_patterns:
      - "*buffer_hash*"
      - "*multithread*"
      - "*multi_device*"
      - "*emulation*"
      - "*checkstride*"
      - "*mpi*"
      - "*worker*"
      - "*half*"
      - "*fp16*"
      - "*hipGraph*"
    test_files:
      - "tests/buffer_hash_test.cpp"
      - "tests/multithread_test.cpp"
      - "tests/multi_device_test.cpp"
      - "tests/hipGraph_test.cpp"
      - "tests/accuracy_test_emulation.cpp"
      - "tests/accuracy_test_checkstride.cpp"
      - "tests/rocfft_mpi_worker.cpp"
      - "tests/accuracy_test_1D.cpp"
    labels:
      - "performance"
      - "level4"

# Test execution settings
execution_settings:
  default_timeout: 300  # 5 minutes per test
  category_timeouts:
    level1: 600        # 10 minutes
    level2: 900        # 15 minutes 
    level3: 1200       # 20 minutes for prime length tests
    level4: 1500         # 25 minutes for mixed radix tests

