###############################################################################
# Benchmark Suite Configuration
#
# All benchmark tasks are defined here as a flat list. The runner
# (run_suite.py) schedules them across GPUs automatically.
#
# Fields:
#   label  : Display name for logs (required)
#   group  : Group tag for filtering with --group (optional)
#   script : Benchmark script, relative to benchmark/ops/ (required)
#   output : Output CSV filename (required)
#   args   : CLI arguments (optional, default [])
#   env    : Extra environment variables (optional, default {})
#   gpus   : Number of GPUs needed (optional, default 1)
#   shardable : Set true if the underlying script accepts --num-shards
#               and --shard-id (currently bench_gemm_turbo.py and
#               bench_grouped_gemm_turbo.py). Lets run_suite.py -s N
#               split the task across N GPUs and merge the parts.
#
# Usage:
#   python3 benchmark/ops/run_suite.py -d output/               # run all
#   python3 benchmark/ops/run_suite.py -d output/ -g attention  # run one group
###############################################################################

num_gpus: 8

tasks:
  # ── Attention ─────────────────────────────────────────────
  - label: attention_torch
    group: attention
    script: bench_attention_torch.py
    output: attention_torch_benchmark.csv

  - label: attention_turbo
    group: attention
    script: bench_attention_turbo.py
    output: attention_benchmark.csv

  - label: attention_fp8
    group: attention
    script: bench_attention_turbo.py
    args: [--fp8]
    output: attention_fp8_benchmark.csv

  - label: attention_deterministic
    group: attention
