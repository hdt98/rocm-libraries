name: Primus-Turbo-CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    # 'labeled' lets maintainers trigger the GPU jobs by adding the 'ci:gpu'
    # label after a quick review, instead of every PR push burning GPU runners.
    types: [opened, synchronize, reopened, labeled]

# Cancel an in-progress run when the same PR (or branch) gets a new push,
# so repeated pushes don't stack up on the scarce self-hosted GPU runners.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UCCL_WHEEL_DIR: /apps/tas/0_public/primus_turbo_ci/uccl-wheel-v2602
  # Required aiter release. Keep in sync with AITER_GIT_TAG in primus_turbo/common/aiter_utils.py.
  AITER_VERSION: v0.1.14.post1

jobs:
  code-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Print job info
        run: |
          echo "🎉 Begin Primus-Turbo Python Lint."
          echo "🐧 Running on ${{ runner.os }}, branch: ${{ github.ref }}"
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory /github/workspace
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
            python-version: ${{ matrix.python-version }}
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Install Autoflake
        run: pip install autoflake==v2.3.1
      - name: Run Autoflake
        if: always()
        run: |
          output=$(autoflake . --remove-all-unused-imports --remove-unused-variables --expand-star-imports --ignore-init-module-imports --recursive)
          if [[ -n $output ]]
          then
            echo "Autoflake check failed: $output"
            exit 1
          else
            echo "Autoflake check success."
            exit 0
          fi
      - uses: isort/isort-action@v1
        if: always()
        with:
            configuration: "--profile black --check-only --diff"
      - uses: psf/black@24.8.0
        if: always()
        with:
          options: "--check --diff --color --verbose --line-length=110"

  install-dependencies:
    # GPU runner job: for PRs, only run when a maintainer adds the 'ci:gpu'
    # label. Non-PR events (push to main, tags, manual dispatch) always run.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:gpu')
    runs-on: turbo-torch-ut-v2602
    env:
        UCCL_COMMIT: 69a21407d261a8ff0f01f83bb0f5b35da059876d #  [rdma] Make CQ Ex flags configurable for NIC compatibility. (#689)
        UCCL_PY_VER: 3.12
    steps:
      - name: Print job info
        run: |
          echo "🎉 Begin Primus-Turbo Install Dependencies."
          echo "🐧 Running on ${{ runner.os }}, branch: ${{ github.ref }}"

      - name: Checkout UCCL
        uses: actions/checkout@v4
        with:
          repository: uccl-project/uccl
          ref: ${{ env.UCCL_COMMIT }}
          fetch-depth: 0

      - name: Build UCCL
        run: |
          # Build and install uccl-ep wheel based on Primus-Turbo CI container.
          # Note(zhuang12): For official builds, use uccl/build.sh with docker/Dockerfile.rocm instead.

          start_time=$(date +%s)
          echo "✅ [build uccl] started at: $(date)"

          # Install UCCL build dependencies
          apt update && apt install -y rdma-core libibverbs-dev libnuma-dev libgoogle-glog-dev

          # build ep
          pushd ep
          python3 setup.py build
          popd
          cp ep/build/**/*.so uccl/
          python3 setup.py bdist_wheel

          pushd ep/deep_ep_wrapper
          python3 setup.py bdist_wheel
          popd
          cp ep/deep_ep_wrapper/dist/*.whl dist/

          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "✅ [build uccl] ended at: $(date)"
          echo "⏱️ [build uccl] Total elapsed time: ${elapsed} seconds"

      - name: Copy wheel to shared storage
        run: |
          # if exists, remove the existing wheels
          if [ -d "${{ env.UCCL_WHEEL_DIR }}" ]; then
            echo "UCCL_WHEEL_DIR dir exists. Deleting..."
            rm -rf "${{ env.UCCL_WHEEL_DIR }}"
          fi
          mkdir -p ${{ env.UCCL_WHEEL_DIR }}
          ls -al ${{ env.UCCL_WHEEL_DIR }}

          cp -v dist/*.whl ${{ env.UCCL_WHEEL_DIR }}/
          echo "📦 Wheel files copied to: ${{ env.UCCL_WHEEL_DIR }}"
          ls -la ${{ env.UCCL_WHEEL_DIR }}

  unittest-pytorch-gfx942:
    needs: [code-lint, install-dependencies]
    # GPU runner job: gated on the 'ci:gpu' label for PRs (see install-dependencies).
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:gpu')
    runs-on: turbo-torch-ut-v2602 # launch in the container turbo_torch_github_runner_v2602 based on the image rocm/primus:v26.2
    env:
      PRIMUS_TURBO_WORKDIR: /apps/tas/0_public/primus_turbo_ci/actions-runner-torch
    steps:
      - run: echo "🎉 Begin Primus-Turbo PyTorch Framework Unit Test."
      - name: Change owner
        run: |
          echo "change the owner of all primus-turbo files, as some files are generated by root"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          sudo chown -R $(id -u):$(id -g) ${GITHUB_WORKSPACE}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Print dir
        run: |
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "current dir: $(pwd)"
      - name: Set ut log path
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/latest" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME=${{ github.ref }}  # refs/tags/v1.0.0
            TAG="${TAG_NAME#refs/tags/}" # v1.0.0
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/$TAG" >> $GITHUB_ENV
          else
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/others" >> $GITHUB_ENV
          fi
      - name: Print rocminfo
        run: |
          echo "=== rocminfo ==="
          rocminfo || true
      - name: Install dependencies
        run: |
          # ===== Install UCCL wheel =====
          echo "==> Installing UCCL from pre-built wheel..."
          echo "Wheel directory: ${{ env.UCCL_WHEEL_DIR }}"
          ls -la "${{ env.UCCL_WHEEL_DIR }}/"
          pip3 install "${{ env.UCCL_WHEEL_DIR }}"/*.whl

          echo "==> UCCL installation completed successfully!"
      - name: Install and build
        run: |
          echo "set UT_LOG_PATH as: ${{ env.UT_LOG_PATH }}"
          if [ -d "${{ env.UT_LOG_PATH }}" ]; then
            echo "UT_LOG_PATH dir exists. Deleting..."
            rm -rf "${{ env.UT_LOG_PATH }}"
          fi
          unset AITER_ASM_DIR
          pip3 uninstall -y aiter amd-aiter || true
          pip3 install -r requirements.txt
          pip3 install "amd-aiter @ git+https://github.com/ROCm/aiter.git@${AITER_VERSION}"
          GPU_ARCHS="gfx942;gfx950" PRIMUS_TURBO_FRAMEWORK="PYTORCH" pip3 install --no-build-isolation -e ".[pytorch]" -v
      - name: Run single-GPU tests (parallel)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 135
          max_attempts: 2
          # use timeout to terminate pytest and its workers on timeout
          command: >
            timeout -k 60s 130m
            bash -lc
            "exec pytest -v tests/pytorch -n 8 --log-cli-level=INFO"
        env:
          XLA_PYTHON_CLIENT_PREALLOCATE: "false"
      - name: Run deterministic tests (parallel)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 2
          # use timeout to terminate pytest and its workers on timeout
          command: >
            timeout -k 60s 55m
            bash -lc
            "exec pytest -v tests/pytorch -n 8 --deterministic-only --log-cli-level=INFO"
        env:
          XLA_PYTHON_CLIENT_PREALLOCATE: "false"
      - name: Run distributed tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 2
          command: pytest -v tests/pytorch --dist-only --log-cli-level=INFO
        env:
          XLA_PYTHON_CLIENT_PREALLOCATE: "false"

  unittest-jax-gfx942:
    needs: code-lint
    # GPU runner job: gated on the 'ci:gpu' label for PRs (see install-dependencies).
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:gpu')
    runs-on: turbo-jax-ut-v2602 # launch in the container turbo_jax_github_runner_v2602 based on the image rocm/jax-training:maxtext-v26.2
    env:
      PRIMUS_TURBO_WORKDIR: /apps/tas/0_public/primus_turbo_ci/actions-runner-jax
    steps:
      - run: echo "🎉 Begin Primus-Turbo JAX Framework Unit-Test."
      - name: Change owner
        run: |
          echo "change the owner of all primus-turbo files, as some files are generated by root"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          sudo chown -R $(id -u):$(id -g) ${GITHUB_WORKSPACE}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Print dir
        run: |
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "current dir: $(pwd)"
      - name: Set ut log path
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/latest" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME=${{ github.ref }}  # refs/tags/v1.0.0
            TAG="${TAG_NAME#refs/tags/}" # v1.0.0
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/$TAG" >> $GITHUB_ENV
          else
            echo "UT_LOG_PATH=${PRIMUS_TURBO_WORKDIR}/ut_out/others" >> $GITHUB_ENV
          fi
      - name: Print rocminfo
        run: |
          echo "=== rocminfo ==="
          rocminfo || true
      - name: Install and build
        run: |
          echo "set UT_LOG_PATH as: ${{ env.UT_LOG_PATH }}"
          if [ -d "${{ env.UT_LOG_PATH }}" ]; then
            echo "UT_LOG_PATH dir exists. Deleting..."
            rm -rf "${{ env.UT_LOG_PATH }}"
          fi
          unset AITER_ASM_DIR
          pip3 install -r requirements.txt
          GPU_ARCHS="gfx942;gfx950" PRIMUS_TURBO_FRAMEWORK="JAX" pip3 install --no-build-isolation -e ".[jax]" -v
      - name: Run single-GPU tests (parallel)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 2
          command: pytest -v tests/jax -n 8 --log-cli-level=INFO
        env:
          XLA_PYTHON_CLIENT_PREALLOCATE: "false"
      # Keep in-process multi-GPU tests and distributed/per-process tests in
      # separate pytest invocations. The JAX DeepEP in-process path keeps GPU
      # runtime state inside the pytest process, while the MP tests spawn their
      # own worker processes; collecting/running both together can pollute that
      # state and make later parameterized cases hang.
      - name: Run in-process multi-GPU tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: pytest -v tests/jax --dist-only --ignore=tests/jax/lax/test_mp_dispatch_combine.py --log-cli-level=INFO
        env:
          XLA_PYTHON_CLIENT_PREALLOCATE: "false"
      - name: Run distributed tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: pytest -v tests/jax/lax/test_mp_dispatch_combine.py --log-cli-level=INFO
        env:
          XLA_PYTHON_CLIENT_PREALLOCATE: "false"
