name: Primus-Turbo-Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  BENCHMARK_ROOT_DIR: /wekafs/primus_turbo/benchmark
  # Required aiter release. Keep in sync with AITER_GIT_TAG in primus_turbo/common/aiter_utils.py.
  AITER_VERSION: v0.1.14.post1

jobs:
  benchmark-pytorch-gfx942:
    runs-on: turbo-pt-bench-gfx942-2510-kfpfd
    env:
      GPU_NAME: MI325  # Change this to your GPU model
    steps:
      - run: echo "🎉 Begin Primus-Turbo Benchmark."
      - name: Change owner
        run: |
          echo "change the owner of all primus-turbo files, as some files are generated by root"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          sudo chown -R $(id -u):$(id -g) ${GITHUB_WORKSPACE}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'
      - name: Print dir
        run: |
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "current dir: $(pwd)"
      - name: Print rocminfo
        run: |
          echo "=== rocminfo ==="
          rocminfo || true
      - name: Install Primus-Turbo
        run: |
          unset AITER_ASM_DIR
          pip3 uninstall -y aiter amd-aiter || true
          pip3 install -r requirements.txt
          pip3 install "amd-aiter @ git+https://github.com/ROCm/aiter.git@${AITER_VERSION}"
          GPU_ARCHS="gfx942" PRIMUS_TURBO_FRAMEWORK="PYTORCH" pip3 install --no-build-isolation -e ".[pytorch]" -v
      - name: Create benchmark output directory
        run: |
          BENCHMARK_DATE=$(date +%Y%m%d)
          BENCHMARK_DATE_DIR="${BENCHMARK_ROOT_DIR}/${BENCHMARK_DATE}"
          BENCHMARK_OUTPUT_DIR="${BENCHMARK_DATE_DIR}/${GPU_NAME}"
          mkdir -p "${BENCHMARK_OUTPUT_DIR}"
          mkdir -p "${BENCHMARK_DATE_DIR}/H200"
          echo "BENCHMARK_DATE_DIR=${BENCHMARK_DATE_DIR}" >> $GITHUB_ENV
          echo "BENCHMARK_OUTPUT_DIR=${BENCHMARK_OUTPUT_DIR}" >> $GITHUB_ENV

      - name: "Run All Benchmarks"
        timeout-minutes: 360
        continue-on-error: true
        run: python3 benchmark/ops/run_suite.py -d "${BENCHMARK_OUTPUT_DIR}"

      - name: "Copy H200 benchmark data"
        run: |
          H200_LATEST_DIR="${BENCHMARK_ROOT_DIR}/H200/latest"
          H200_OUTPUT_DIR="${BENCHMARK_DATE_DIR}/H200"
          if [ -d "${H200_LATEST_DIR}" ]; then
            cp -v ${H200_LATEST_DIR}/*.csv "${H200_OUTPUT_DIR}/" || true
          else
            echo "Warning: H200 latest directory not found: ${H200_LATEST_DIR}"
          fi
      - name: "Generate Summary Report"
        run: |
          BENCHMARK_DATE=$(date +%Y-%m-%d)
          python3 benchmark/ops/summarize_results.py --data-dir "${BENCHMARK_DATE_DIR}" --gpu MI325 H200 --date "${BENCHMARK_DATE}" -o "${BENCHMARK_DATE_DIR}/summary.csv"
