###############################################################################
# Grok-1 model config for Primus (Plan A)
#
# MaxText has no built-in grok1 model config, so architecture params are
# provided here. They will override base.yml defaults in the exported YAML.
# attention / use_iota_embed inherit from model_base.yaml.
###############################################################################
extends:
  - model_base.yaml

# --- Architecture (Grok-1 = Mixtral-style 8×expert, larger dims) ---
decoder_block: "mixtral"
base_emb_dim: 6144
base_num_query_heads: 48
base_num_kv_heads: 8
base_mlp_dim: 32768
base_moe_mlp_dim: 32768
base_num_decoder_layers: 64
head_dim: 128
mlp_activations: ["silu", "linear"]
vocab_size: 131072
num_experts: 8
num_experts_per_tok: 2
rope_max_timescale: 1_000_000

# --- Tokenizer ---
tokenizer_path: "mistralai/Mixtral-8x22B-v0.1"

# --- Model behaviour ---
enable_dropout: false
logits_via_embedding: false
normalization_layer_epsilon: 1.0e-5
