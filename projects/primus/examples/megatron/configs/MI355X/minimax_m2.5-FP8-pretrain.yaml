work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:minimax_m2.5-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # model to run
    model: ${PRIMUS_MODEL:minimax_m2.5}.yaml
    overrides:
      # log
      wandb_project: "Primus_MiniMax_M2.5_Pretrain"
      stderr_sink_level: DEBUG

      # debug
      moe_router_force_load_balancing: true
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      # hyper parameters (optimized for 8-node 64-GPU MI355X)
      train_iters: 10
      micro_batch_size: 3
      global_batch_size: 768
      seq_length: ${PRIMUS_SEQ_LENGTH:4096}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:4096}
      num_layers: 62
      lr: 2.2e-4
      min_lr: 2.2e-5
      lr_warmup_iters: 200
      lr_decay_iters: 5000
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.02
      norm_epsilon: 1.0e-6

      # parallel (optimized: PP=4 with VPP=2 for reduced pipeline bubble)
      tensor_model_parallel_size: ${PRIMUS_TP:1}
      pipeline_model_parallel_size: 4
      expert_model_parallel_size: 8
      virtual_pipeline_model_parallel_size: 2
      pipeline_model_parallel_layout: "Et*7|t*8|t*8|t*8|t*8|t*8|t*8|t*7,L"
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: true

      # recompute (optimized: disabled for max throughput)
      recompute_num_layers: 0
      recompute_granularity: full
      recompute_method: block

      # data
      mock_data: true
      train_data_path: ${PRIMUS_TOKENIZED_DATA_PATH:null}
      valid_data_path: null
      test_data_path: null

      moe_layer_freq: 1
      apply_rope_fusion: true
      enable_experimental: true

      # ckpt
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch
      eval_iters: 0

      # Turbo
      enable_primus_turbo: true
      use_turbo_attention: false
      use_turbo_grouped_mlp: false
      use_turbo_rms_norm: true

      # deepep
      use_turbo_deepep: true
      moe_shared_expert_overlap: false
      moe_router_dtype: fp32
      turbo_deepep_num_cu: 80
      turbo_deepep_use_comm_stream: false
      turbo_sync_free_moe_stage: 1

      moe_use_fused_router_with_aux_score: true
      moe_permute_fusion: true

      # Cross entropy flags
      cross_entropy_fusion_impl: "te"
      cross_entropy_loss_fusion: true

      # enable fp8 training
      fp8: hybrid
      moe_use_legacy_grouped_gemm: false

      # precision-aware optimizer (bf16 states to save memory)
      use_precision_aware_optimizer: true
      main_grads_dtype: bf16
      exp_avg_dtype: bf16
      exp_avg_sq_dtype: bf16

      # training control
      manual_gc: true
      manual_gc_interval: 1
      pp_warmup: true
      mtp_num_layers: 0
      disable_wandb: true
      disable_tensorboard: true
