work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:lfm2_8B_A1B-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # model to run
    model: ${PRIMUS_MODEL:lfm2_8B_A1B}.yaml
    overrides:
      # log
      wandb_project: "Primus_LFM2_8B_A1B_Pretrain"
      stderr_sink_level: DEBUG

      # debug
      moe_router_force_load_balancing: true
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      lfm_layer_types: ["conv", "conv", "full_attention", "conv", "conv", "conv", "full_attention", "conv", "conv", "conv", "full_attention", "conv", "conv", "conv", "full_attention", "conv", "conv", "conv", "full_attention", "conv", "conv", "full_attention", "conv", "conv"]
      moe_layer_freq: "([0]*2+[1]*22)"
      conv_L_cache: 3 # int
      conv_bias: false # bool

      # hyper parameters
      train_iters: 10
      micro_batch_size: 8
      global_batch_size: 256
      seq_length: ${PRIMUS_SEQ_LENGTH:4096}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:4096}
      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      # recompute
      recompute_granularity: full # full, selective
      recompute_method: block # uniform, block
      recompute_num_layers: 0 # int

      # parallel
      tensor_model_parallel_size: ${PRIMUS_TP:1}
      pipeline_model_parallel_size: ${PRIMUS_PP:1}
      expert_model_parallel_size: ${PRIMUS_EP:8}
      overlap_grad_reduce: true
      overlap_param_gather: true

      # data
      mock_data: true
      train_data_path: ${PRIMUS_TOKENIZED_DATA_PATH:null}
      valid_data_path: null
      test_data_path: null

      gradient_accumulation_fusion: true
      moe_use_legacy_grouped_gemm: true

      # ckpt
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch
      eval_iters: 0

      # Turbo
      enable_primus_turbo: true
      use_turbo_attention: false
      use_turbo_grouped_mlp: false

      # deepep
      use_turbo_deepep: true
      moe_shared_expert_overlap: false
      moe_router_dtype: fp32

      # 64 or 80 for ep8, 32 for ep16-64 is best practice
      turbo_deepep_num_cu: 80
      turbo_deepep_use_comm_stream: false

      # sync-free moe support stage 1-2, 0 means not use sync-free moe
      # stage 2 is recommended for better performance
      turbo_sync_free_moe_stage: 1

      # Cross entropy flags
      cross_entropy_fusion_impl: "te"
      cross_entropy_loss_fusion: true

      fp8: hybrid
      fp8_recipe: delayed # 'tensorwise', 'delayed', 'mxfp8', 'blockwise', 'custom'
      # enable_primus_turbo: true
      # use_turbo_attention: true
      # use_turbo_grouped_mlp: false
      # enable_primus_turbo: false
      # enable_turbo_attention_float8 : false
      # enable_turbo_gemm_float8 : false
