name: TheRock CI TSAN

on:
  pull_request:
  schedule:
    - cron: "0 8 * * *" # Runs nightly at 8 AM UTC (offset from ASAN at 7 AM)
  workflow_dispatch:
    inputs:
      projects:
        type: string
        description: "Insert space-separated list of projects to test or 'all' to test all projects. ex: 'projects/rocprim projects/hipcub'"
        default: ""

permissions:
  contents: read

jobs:
  setup:
    name: "Setup"
    runs-on: ubuntu-24.04
    outputs:
      linux_projects: ${{ steps.linux_projects.outputs.linux_projects }}
      test_type: ${{ steps.linux_projects.outputs.test_type }}
      linux_package_targets: ${{ steps.configure_linux.outputs.package_targets }}
      build_variant_cmake_preset: ${{ steps.linux_projects.outputs.build_variant_cmake_preset }}
      build_variant_label: ${{ steps.linux_projects.outputs.build_variant_label }}
      expect_failure: ${{ steps.linux_projects.outputs.expect_failure }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: true
          fetch-depth: 2

      - name: Checkout TheRock repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: "ROCm/TheRock"
          path: TheRock
          ref: 085571a87f8050f94c77eb90454995b6d1b75658 # 2026-02-26

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic requests

      - name: Determine Linux projects to run
        id: linux_projects
        env:
          PROJECTS: ${{ inputs.projects }}
          PLATFORM: "linux"
          BUILD_VARIANT: "tsan"
        run: |
          python .github/scripts/therock_configure_ci.py

      - name: Fetch Linux targets for build and test
        env:
          THEROCK_PACKAGE_PLATFORM: "linux"
          AMDGPU_FAMILIES: "gfx950-dcgpu"
          # Variable comes from ROCm organization variable 'ROCM_THEROCK_TEST_RUNNERS'
          ROCM_THEROCK_TEST_RUNNERS: ${{ vars.ROCM_THEROCK_TEST_RUNNERS }}
          LOAD_TEST_RUNNERS_FROM_VAR: true
          BUILD_VARIANT: "tsan"
        id: configure_linux
        run: python ./TheRock/build_tools/github_actions/fetch_package_targets.py

  therock-ci-linux-tsan:
    name: Linux TSAN (${{ matrix.projects.projects_to_test }} | ${{ matrix.target_bundle.amdgpu_family }})
    permissions:
      contents: read
      id-token: write
    needs: setup
    if: ${{ needs.setup.outputs.linux_projects != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        projects: ${{ fromJSON(needs.setup.outputs.linux_projects) }}
        target_bundle: ${{ fromJSON(needs.setup.outputs.linux_package_targets) }}
    uses: ./.github/workflows/therock-ci-linux.yml
    secrets: inherit
    with:
      cmake_options: ${{ matrix.projects.cmake_options }}
      projects_to_test: ${{ matrix.projects.projects_to_test }}
      test_type: ${{ needs.setup.outputs.test_type }}
      amdgpu_families: ${{ matrix.target_bundle.amdgpu_family }}
      test_runs_on: ${{ matrix.target_bundle.test_machine }}
      build_variant_cmake_preset: ${{ needs.setup.outputs.build_variant_cmake_preset }}
      build_variant_label: ${{ needs.setup.outputs.build_variant_label }}
      expect_failure: ${{ needs.setup.outputs.expect_failure }}

  therock_ci_tsan_summary:
    name: TheRock CI TSAN Summary
    if: always()
    needs:
      - setup
      - therock-ci-linux-tsan
    runs-on: ubuntu-24.04
    steps:
      - name: Output failed jobs
        run: |
          echo '${{ toJson(needs) }}'
          FAILED_JOBS="$(echo '${{ toJson(needs) }}' \
            | jq --raw-output \
            'map_values(select(.result!="success" and .result!="skipped")) | keys | join(",")' \
          )"
          if [[ "${FAILED_JOBS}" != "" ]]; then
            echo "The following jobs failed: ${FAILED_JOBS}"
            exit 1
          fi
