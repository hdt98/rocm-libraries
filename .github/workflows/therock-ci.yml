name: TheRock CI

on:
  push:
    branches:
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      projects:
        type: string
        description: "Override: comma-separated list of projects to test (e.g., 'projects/rocprim,projects/hipcub'). Leave blank for normal behavior (auto-detect from changes). Use 'all' to test all projects."
        default: ""
      linux_amdgpu_families:
        type: string
        description: "Comma-separated list of Linux GPU families to build and test (e.g., 'gfx94X,gfx1201')"
        default: "gfx94X"
      windows_amdgpu_families:
        type: string
        description: "Comma-separated list of Windows GPU families to build and test (e.g., 'gfx110X,gfx1201')"
        default: "gfx110X"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    # TODO: Update to @main after TheRock PR merges
    uses: ROCm/TheRock/.github/workflows/ci.yml@users/jayhawk-commits/deduplicate-ci
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      external_source_checkout: true
      therock_ref: users/jayhawk-commits/deduplicate-ci
      projects: ${{ inputs.projects || '' }}
      linux_amdgpu_families: ${{ inputs.linux_amdgpu_families || '' }}
      windows_amdgpu_families: ${{ inputs.windows_amdgpu_families || '' }}
