# Update documentation on Read the docs
# -----------------------------------
# This GitHub Actions workflow runs on push commits. It detects commit's target branch and project,
# then triggers the corresponding build on Read the Docs.
# Key Steps:
# 1. Compare the current commit to the last commit and obtain the path of changed files
# 2. Extract a set of project names from changed file path
# 3. Obtain the target branch name and convert it into Read the Docs format
# 4. Use Read the Docs V3 API to trigger the build for the corresponding docs:
#    Github project name -> Read the docs project name
#    Github branch name -> Read the docs version
#
# This ensures live documentation is synchronized with the latest change.

name: Docs Check

on:
  # Trigger when PR is opened, or new commits are pushed
  pull_request:
    branches:
      - 'users/alexxu12/docs-pr-preview'
    paths:
      - 'projects/**/docs/**'
      - 'shared/**/docs/**'

  # Allow manual triggering via comment
  issue_comment:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if either:
    # 1. PR modifies docs files
    # 2. A comment "/docs-check" is made on a PR
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/docs-check'))
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout config files only
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic requests

      - name: Set up Git user
        run: |
          git config user.name "assistant-librarian[bot]"
          git config user.email "assistant-librarian[bot]@users.noreply.github.com"

      - name: Detect changed subtrees from merged PR
        id: detect
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          python .github/scripts/pr_detect_changed_subtrees.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --config ".github/repos-config.json" \
            --require-auto-push

      - name: Checkout full repo with changed subtrees
        if: steps.detect.outputs.subtrees
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            .github
            ${{ steps.detect.outputs.subtrees }}
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Install Python dependencies and build docs
        run: |
          REQ_FILE="${{ steps.detect.outputs.subtrees }}/docs/sphinx/requirements.txt"
          if [ -f "$REQ_FILE" ]; then
            echo "Installing requirements from $REQ_FILE"
            pip install -r "$REQ_FILE"
            sudo apt-get update
            sudo apt-get install -y doxygen graphviz
            cd ${{ steps.detect.outputs.subtrees }}/docs
            python -m sphinx -T -b html -d _build/doctrees -D language=en . _build/html
          else
            echo "No requirements.txt found at $REQ_FILE, skipping."
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.detect.outputs.subtrees }}/docs/_build/html
      
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4