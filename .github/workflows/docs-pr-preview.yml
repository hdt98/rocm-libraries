# Create a documentation preview in the pull request
# --------------------------------------------------
# This GitHub Actions workflow triggers by commenting '/docs-preview' on a PR.
# It will build the documentation and display the preview via Netlify.
#
# Key Steps:
# 1. Use the script (.github/scripts/pr_detect_changed_subtrees.py) to detect changed project
# 2. Install the environment and dependencies using project's requirements.txt
# 3. Build the documentation using Sphinx and Doxygen
# 4. Deploy the preview to Netlify
#
# The workflow provides a look and feel to the reviewer. Note if multiple projects are involved in one PR,
# it will only display the preview for one of the projects.

name: Docs Preview

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run when '/docs-preview' is commented on a PR by a member, owner, or collaborator
    if: >
      ${{ github.event.issue.pull_request }} &&
      contains(${{ github.event.comment.body }}, '/docs-preview') &&
      (
        ${{ github.event.comment.author_association }} == 'MEMBER' ||
        ${{ github.event.comment.author_association }} == 'OWNER' ||
        ${{ github.event.comment.author_association }} == 'COLLABORATOR'
      )
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout config files only
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.10'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic requests

      - name: Set up Git user
        run: |
          git config user.name "assistant-librarian[bot]"
          git config user.email "assistant-librarian[bot]@users.noreply.github.com"

      - name: Detect changed subtrees from PR
        id: detect
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          python .github/scripts/pr_detect_changed_subtrees.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.issue.number }}" \
            --config ".github/repos-config.json" \
            --require-auto-push

      - name: Extract first project
        id: extract
        run: |
          project=$(echo "${{ steps.detect.outputs.subtrees }}" | head -n1)
          echo "project=$project" >> $GITHUB_OUTPUT

      - name: Get PR details
        if: steps.extract.outputs.project
        id: pr
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "head_sha=$(echo $PR_DATA | jq -r .head.sha)" >> $GITHUB_OUTPUT
          echo "pr_number=$(echo $PR_DATA | jq -r .number)" >> $GITHUB_OUTPUT

      - name: Checkout full repo with changed project
        if: steps.extract.outputs.project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          sparse-checkout: |
            .github
            ${{ steps.extract.outputs.project }}
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      # Setup dependencies and build the docs
      - name: Install Python dependencies and build docs
        if: steps.extract.outputs.project
        run: |
          REQ_FILE="${{ steps.extract.outputs.project }}/docs/sphinx/requirements.txt"
          if [ -f "$REQ_FILE" ]; then
            echo "Installing requirements from $REQ_FILE"
            pip install -r "$REQ_FILE"
            sudo apt-get update
            sudo apt-get install -y doxygen graphviz
            cd ${{ steps.extract.outputs.project }}/docs
            python -m sphinx -T -b html -d _build/doctrees -D language=en . _build/html
          else
            echo "No requirements.txt found at $REQ_FILE, skipping."
          fi

      # Deploy to Netlify
      - name: Deploy PR preview to Netlify
        if: steps.extract.outputs.project
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ${{ steps.extract.outputs.project }}/docs/_build/html
          production-deploy: false
          github-token: ${{ steps.generate-token.outputs.token }}
          deploy-message: "Deploy preview for PR #${{ github.event.pull_request.number }}"
          alias: pr-${{ github.event.pull_request.number }}
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_PAT }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID }}
