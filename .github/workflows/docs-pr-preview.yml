# Create a documentation preview in the pull request 
# --------------------------------------------------
# This GitHub Actions workflow triggers by openning/updating a PR. If the PR changes any
# docs content, it will build the change and display the preview.
# Key Steps:
# 1. Use the script (.github/scripts/pr_detect_changed_subtrees.py) to detect changed project
# 2. Build the environment and dependencies using project's requirements.txt
# 3. Build the documentation using sphinx and doxygen
# 4. Deploy the page onto github-pages 
#
# This blocks changes that can potentially broke the docs build, also provides a look
# and feel to the reviewer.

name: Docs Preview

on:
  pull_request_target:
    # branches:
    #   - 'develop'
    #   - 'docs/**'
    types: [opened, synchronize, reopened, ready_for_review]

  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if either:
    # 1. PR modifies docs files
    # 2. A comment "/docs-check" is made on a PR
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/docs-check'))
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout config files only
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.10'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic requests

      - name: Set up Git user
        run: |
          git config user.name "assistant-librarian[bot]"
          git config user.email "assistant-librarian[bot]@users.noreply.github.com"

      - name: Detect changed subtrees from merged PR
        id: detect
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          python .github/scripts/pr_detect_changed_subtrees.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --config ".github/repos-config.json" \
            --require-auto-push
          project=$(echo "${{ steps.detect.outputs.subtrees }}" | head -n1)
          echo "project=$project" >> $GITHUB_OUTPUT

      - name: Checkout full repo with changed project
        if: steps.detect.outputs.project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: |
            .github
            ${{ steps.detect.outputs.project }}
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      # Setup dependencies and build the docs
      - name: Install Python dependencies and build docs
        if: steps.detect.outputs.project
        run: |
          REQ_FILE="${{ steps.detect.outputs.project }}/docs/sphinx/requirements.txt"
          if [ -f "$REQ_FILE" ]; then
            echo "Installing requirements from $REQ_FILE"
            pip install -r "$REQ_FILE"
            sudo apt-get update
            sudo apt-get install -y doxygen graphviz
            cd ${{ steps.detect.outputs.project }}/docs
            python -m sphinx -T -b html -d _build/doctrees -D language=en . _build/html
          else
            echo "No requirements.txt found at $REQ_FILE, skipping."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.detect.outputs.project }}/docs/_build/html
  
  # Deploy the content onto github-pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
