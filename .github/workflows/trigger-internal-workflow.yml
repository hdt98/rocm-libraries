# Trigger Internal Workflow
#
# This is a workflow that will be used to trigger internal workflows on EMU.
# This will be used instead of running the same workflows on public side to maintain confidentiality.
# An example workflow that will be triggered with this workflow is a workflow that will check to see
# whether new commits made by developers will raise any conflicts on EMU side.

name: Trigger Internal Workflow

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: "PR number to pass to internal workflow"
        required: true
        type: string
  pull_request:
    types: [opened, ready_for_review, synchronize]
    branches: [users/hsivasun/external-workflow-dispatch]
  push:

jobs:
  trigger:
    runs-on: azure-vms
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ secrets.INTERNAL_ORG }}
          repositories: ${{ secrets.INTERNAL_REPO }}

      - name: Determine PR number
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Use the PR number from the pull_request event
            pr_number="${{ github.event.pull_request.number }}"
            echo "Using PR number from pull_request event: $pr_number"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Use the manually input PR number
            pr_number="${{ github.event.inputs.pr-number }}"
            echo "Using PR number from workflow_dispatch input: $pr_number"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # For push events, use hardcoded PR number for testing
            pr_number="2160"
            echo "Push event detected - using hardcoded PR number for testing: $pr_number"
          else
            echo "Unknown event type: ${{ github.event_name }}"
            exit 1
          fi
          echo "pr_number=$pr_number" >> $GITHUB_OUTPUT

      - name: Generate unique tracking ID
        id: tracking
        run: |
          # Generate unique tracking ID for this trigger
          tracking_id="${{ github.run_id }}-$(date +%s)-$RANDOM"
          echo "tracking_id=$tracking_id" >> $GITHUB_OUTPUT
          echo "Tracking ID: $tracking_id"

      - name: Trigger internal workflow
        env:
          TARGET_REPO: "${{ secrets.INTERNAL_ORG }}/${{ secrets.INTERNAL_REPO }}"
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          TRACKING_ID: ${{ steps.tracking.outputs.tracking_id }}
        run: |
          echo "Triggering internal workflow"
          echo "PR Number: ${{ steps.pr-info.outputs.pr_number }}"
          echo "Tracking ID: $TRACKING_ID"

          # Send repository dispatch with unique tracking ID
          response=$(curl -s -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$TARGET_REPO/dispatches \
            -d "{
              \"event_type\": \"run-internal-workflow\",
              \"client_payload\": {
                \"tracking_id\": \"$TRACKING_ID\",
                \"pr_number\": \"${{ steps.pr-info.outputs.pr_number }}\",
                \"source_repo\": \"${{ github.repository }}\",
                \"source_org\": \"${{ github.repository_owner }}\",
                \"source_ref\": \"${{ github.ref }}\"
              }
            }")

          # Extract HTTP status code
          http_code="${response: -3}"

          if [ "$http_code" = "204" ]; then
            echo "Successfully triggered internal workflow"
            echo "External workflow has been notified"
          else
            echo "Failed to trigger internal workflow (HTTP $http_code)"
            exit 1
          fi
