name: "hipDNN Pre-commit Checks"
on:
  pull_request:
    branches:
      - develop
    paths:
      - 'projects/hipdnn/**'
      - '.pre-commit-config.yaml'

jobs:
  hipdnn-precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy-20 flatbuffers-compiler

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get list of changed files
        id: changed-files
        shell: bash
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          changed=$(git diff --name-only FETCH_HEAD HEAD | grep '^projects/hipdnn/' || true)
          if [ -z "$changed" ]; then
            echo "No hipDNN files changed"
            echo "files_found=false" >> $GITHUB_OUTPUT
          else
            files=$(echo "$changed" | tr '\n' ' ' | sed 's/ *$//')
            echo "all_modified_files=$files" >> $GITHUB_OUTPUT
            echo "files_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Show changed files
        if: steps.changed-files.outputs.files_found == 'true'
        run: |
          echo "Changed hipDNN files:"
          echo "${{ steps.changed-files.outputs.all_modified_files }}" | tr ' ' '\n'

      - name: Disable submodule recursion
        run: git config submodule.recurse false

      - name: Run pre-commit checks
        if: steps.changed-files.outputs.files_found == 'true'
        run: |
          var="${{ steps.changed-files.outputs.all_modified_files }}"
          read -r -a files <<<"$var"
          
          echo "================================================"
          echo "Running pre-commit checks on hipDNN files..."
          echo "================================================"
          printf "  %s\n" "${files[@]}"
          echo ""
          
          # Run pre-commit and capture the exit code
          # Use --show-diff-on-failure to show what needs to be fixed
          if ! pre-commit run --files "${files[@]}" --show-diff-on-failure; then
            echo ""
            echo "================================================"
            echo "❌ Pre-commit checks FAILED"
            echo "================================================"
            echo ""
            echo "Please fix the issues above and commit the changes."
            echo "You can run pre-commit locally with:"
            echo "  pre-commit run --files ${files[*]}"
            echo ""
            echo "Or install pre-commit hooks to run automatically:"
            echo "  pip install pre-commit"
            echo "  pre-commit install"
            echo ""
            exit 1
          fi
          
          echo ""
          echo "================================================"
          echo "✅ All pre-commit checks passed!"
          echo "================================================"
