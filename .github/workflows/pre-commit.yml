name: "pre-commit checks"
on:
  pull_request:
    branches:
      - develop
    paths:
      - 'projects/hipdnn/**'
      - '.pre-commit-config.yaml'

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        project: [hipdnn]
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          sudo apt-get update
          # The rest are managed by pre-commit mirror
          sudo apt-get install -y clang-tidy-20 flatbuffers-compiler

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get list of changed files for ${{ matrix.project }}
        id: changed-files
        shell: bash
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          changed=$(git diff --name-only FETCH_HEAD HEAD | grep "^projects/${{ matrix.project }}/" || true)
          if [ -z "$changed" ]; then
            echo "No ${{ matrix.project }} files changed"
            echo "files_found=false" >> $GITHUB_OUTPUT
          else
            echo "files_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Show changed files for ${{ matrix.project }}
        if: steps.changed-files.outputs.files_found == 'true'
        run: |
          echo "Changed ${{ matrix.project }} files:"
          git diff --name-only FETCH_HEAD HEAD | grep "^projects/${{ matrix.project }}/"

      - name: Disable submodule recursion
        run: git config submodule.recurse false

      - name: Generate minimal compilation database for clang-tidy
        if: steps.changed-files.outputs.files_found == 'true'
        run: |
          echo "Generating compile_commands.json for clang-tidy..."
          cmake -S projects/hipdnn -B build_precommit \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Debug

          # Copy to root so clang-tidy can find it
          cp build_precommit/compile_commands.json .

          echo "Compilation database generated successfully"

      - name: Run pre-commit checks for ${{ matrix.project }}
        if: steps.changed-files.outputs.files_found == 'true'
        run: |
          echo "================================================"
          echo "Running pre-commit checks for ${{ matrix.project }}..."
          echo "================================================"
          echo ""

          # Run pre-commit on all changed files in the branch
          CMD="pre-commit run --from-ref origin/${{ github.event.pull_request.base.ref }} --to-ref HEAD"

          if ! $CMD --show-diff-on-failure; then
            echo ""
            echo "================================================"
            echo "❌ Pre-commit checks FAILED for ${{ matrix.project }}"
            echo "================================================"
            echo ""
            echo "Please fix the issues above and commit the changes."
            echo ""
            echo "To run pre-commit locally on all changed files:"
            echo "  $CMD"
            echo ""
            echo "Or install pre-commit hooks to run automatically on commits:"
            echo "  pip install pre-commit"
            echo "  pre-commit install"
            echo ""
            exit 1
          fi

          echo ""
          echo "================================================"
          echo "✅ All pre-commit checks passed for ${{ matrix.project }}!"
          echo "================================================"
