name: "pre-commit checks"
on:
  pull_request:
    branches:
      - develop
    paths:
      - 'projects/hipdnn/**'
      - '.pre-commit-config.yaml'

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          sudo apt-get update
          # Others are managed by pre-commit mirror
          sudo apt-get install -y \
            flatbuffers-compiler

      - name: Run pre-commit checks
        run: |
          echo "================================================"
          echo "Running pre-commit checks on changed files..."
          echo "================================================"
          echo ""

          # Run pre-commit on all changed files in the branch
          CMD="pre-commit run --from-ref origin/${{ github.event.pull_request.base.ref }} --to-ref HEAD"

          if ! $CMD --show-diff-on-failure; then
            echo ""
            echo "================================================"
            echo "❌ Pre-commit checks FAILED"
            echo "================================================"
            echo ""
            echo "Please fix the issues above and commit the changes."
            echo ""
            echo "To run pre-commit locally on all changed files:"
            echo "  $CMD"
            echo ""
            echo "Or install pre-commit hooks to run automatically on commits:"
            echo "  pip install pre-commit"
            echo "  pre-commit install"
            echo ""
            exit 1
          fi

          echo ""
          echo "================================================"
          echo "✅ All pre-commit checks passed"
          echo "================================================"
