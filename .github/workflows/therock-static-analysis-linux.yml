#
# TheRock superbuild (Linux) + merged compile_commands + run-clang-tidy over
# first-party rocm-libraries sources (projects/, dnn-providers/, shared/).
# No unit/integration tests and no artifact upload.
#
# Notes:
# - Build steps mirror .github/workflows/therock-ci-linux.yml (keep in sync).
# - Analysis uses a portable LLVM binary tarball (clang-tidy includes
#   clang-analyzer-* checks). Recent llvmorg tags often omit Linux x86_64
#   prebuilts; defaults point at a known-good release asset.
#   TheRock's bundled amd-llvm is built with the
#   static analyzer disabled for faster compiler builds; that is unchanged here.
# - Full-stack builds are large; use workflow_dispatch and optional cmake_options
#   to narrow features when experimenting.
# - pull_request (narrow paths) exists so you can test before the workflow lands on
#   the default branch: GitHub does not offer workflow_dispatch until then.

name: TheRock Static Analysis (Linux)

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/therock-static-analysis-linux.yml"
      - ".github/rocm-libraries-clang-tidy.yml"
  workflow_dispatch:
    inputs:
      amdgpu_families:
        description: "THEROCK_AMDGPU_FAMILIES (same token family as CI nightly)"
        type: string
        default: gfx94X-dcgpu
      cmake_options:
        description: "Extra CMake flags (appended like therock-ci-nightly matrix)"
        type: string
        default: ""
      therock_ref:
        description: "TheRock git ref (commit SHA)"
        type: string
        default: "70a6335b27d48f3781ba07eab89269f75a00f527"
      tidy_jobs:
        description: "Parallel jobs for run-clang-tidy"
        type: string
        default: "8"
      llvmorg_tag:
        description: "llvm/llvm-project release tag without prefix (e.g. 18.1.8 for llvmorg-18.1.8)"
        type: string
        default: "18.1.8"
      llvm_tarball_suffix:
        description: "Suffix after clang+llvm-<tag>- in GitHub release asset basename (no .tar.xz)"
        type: string
        default: "x86_64-linux-gnu-ubuntu-18.04"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Build + clang-tidy (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.amdgpu_families || 'gfx94X-dcgpu' }})
    runs-on: azure-linux-scale-rocm
    timeout-minutes: 720
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:48492540591673fdc8d51beb89bde41e7ba13cbb528f643c0a481ba42c4058f2
      options: -v /runner/config:/home/awsconfig/
    env:
      CACHE_DIR: ${{ github.workspace }}/.container-cache
      CCACHE_CONFIGPATH: ${{ github.workspace }}/.ccache/ccache.conf
      # workflow_dispatch uses github.event.inputs; pull_request uses defaults below.
      AMDGPU_FAMILIES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.amdgpu_families || 'gfx94X-dcgpu' }}
      CMAKE_OPTIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.cmake_options || '' }}
      THEROCK_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.therock_ref || '70a6335b27d48f3781ba07eab89269f75a00f527' }}
      TIDY_JOBS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tidy_jobs || '8' }}
      LLVMORG_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.llvmorg_tag || '18.1.8' }}
      LLVM_TARBALL_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.llvm_tarball_suffix || 'x86_64-linux-gnu-ubuntu-18.04' }}
      TEATIME_FORCE_INTERACTIVE: "0"
      AWS_SHARED_CREDENTIALS_FILE: /home/awsconfig/credentials.ini

    steps:
      - name: Checkout rocm-libraries
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout TheRock
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ROCm/TheRock
          path: TheRock
          ref: ${{ env.THEROCK_REF }}

      - name: Install Python dependencies
        run: pip install -r TheRock/requirements.txt

      - name: Cache portable LLVM (clang-tidy)
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.llvm-tidy-toolchain
          key: llvm-tidy-${{ env.LLVMORG_TAG }}-${{ env.LLVM_TARBALL_SUFFIX }}

      - name: Install portable LLVM for run-clang-tidy
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        run: |
          set -eux
          TAG="${LLVMORG_TAG}"
          NAME="clang+llvm-${TAG}-${LLVM_TARBALL_SUFFIX}"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${TAG}/${NAME}.tar.xz"
          rm -rf "$GITHUB_WORKSPACE/.llvm-tidy-toolchain"
          mkdir -p /tmp/llvm-dl
          curl -fsSL "$URL" -o "/tmp/llvm-dl/${NAME}.tar.xz"
          tar -xJf "/tmp/llvm-dl/${NAME}.tar.xz" -C "$GITHUB_WORKSPACE"
          mv "$GITHUB_WORKSPACE/${NAME}" "$GITHUB_WORKSPACE/.llvm-tidy-toolchain"
          rm -rf /tmp/llvm-dl

      - name: Git safe.directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config fetch.parallel 10

      - name: Setup ccache
        run: |
          ./TheRock/build_tools/setup_ccache.py \
            --config-preset "github-oss-dev" \
            --dir "$(dirname "$CCACHE_CONFIGPATH")" \
            --local-path "$CACHE_DIR/ccache"

      - name: Runner health status
        run: ./TheRock/build_tools/health_status.py

      - name: Pull DVC files (optional)
        run: |
          if command -v dvc &> /dev/null; then
            LOGNAME=github-runner dvc pull -v || true
          fi

      - name: Fetch sources
        timeout-minutes: 45
        run: |
          ./TheRock/build_tools/fetch_sources.py --jobs 12 --no-include-rocm-libraries --no-include-ml-frameworks \
            ${{ contains(env.CMAKE_OPTIONS, 'THEROCK_ENABLE_IREE_LIBS=ON') && '--include-iree-libs' || '' }}

      - name: Configure TheRock
        env:
          amdgpu_families: ${{ env.AMDGPU_FAMILIES }}
          package_version: ADHOCBUILD
          extra_cmake_options: "-DTHEROCK_ROCM_LIBRARIES_SOURCE_DIR=../ ${{ env.CMAKE_OPTIONS }}"
          BUILD_DIR: build
        run: python3 TheRock/build_tools/github_actions/build_configure.py

      - name: Build therock-archives and therock-dist
        run: cmake --build TheRock/build --target therock-archives therock-dist -- -k 0

      - name: Merge compile_commands.json
        run: cmake --build TheRock/build --target therock_merged_compile_commands -- -k 0

      - name: Run clang-tidy on rocm-libraries first-party sources
        run: |
          set -eux
          export PATH="$GITHUB_WORKSPACE/.llvm-tidy-toolchain/bin:$PATH"
          command -v run-clang-tidy
          test -f "$GITHUB_WORKSPACE/TheRock/compile_commands.json"
          TIDY_CFG="$GITHUB_WORKSPACE/.github/rocm-libraries-clang-tidy.yml"
          test -f "$TIDY_CFG"
          # LLVM 18 run-clang-tidy has no -source-filter; narrow via a filtered compile DB.
          python3 <<'PY'
          import json, os, pathlib, re, sys

          ws = pathlib.Path(os.environ["GITHUB_WORKSPACE"])
          therock = ws / "TheRock"
          out_dir = therock / ".rocm-libs-tidy-db"
          out_dir.mkdir(parents=True, exist_ok=True)
          with open(therock / "compile_commands.json", encoding="utf-8") as f:
              db = json.load(f)
          pat = re.compile(
              r".*/(projects|dnn-providers|shared)/.*\.(cpp|hpp|h|hh|cc|cxx|c|cuh|hip)$"
          )
          filtered = [
              e for e in db
              if isinstance(e.get("file"), str) and pat.search(e["file"])
          ]
          print(f"compile_commands: kept {len(filtered)} / {len(db)} entries for rocm-libraries paths", file=sys.stderr)
          if not filtered:
              print("error: filter matched no entries; check path layout vs compile_commands.json", file=sys.stderr)
              sys.exit(1)
          with open(out_dir / "compile_commands.json", "w", encoding="utf-8") as out:
              json.dump(filtered, out)
          PY
          run-clang-tidy -p "$GITHUB_WORKSPACE/TheRock/.rocm-libs-tidy-db" \
            -config-file="$TIDY_CFG" \
            -j "${{ env.TIDY_JOBS }}" \
            -quiet

      - name: CCache stats
        if: always()
        run: ccache -s -v || true
