name: Trigger documentation build on Read the Docs

on:
  push:
    branches:
      - 'develop'
      - 'docs/**'
      - 'users/alexxu12/docs-demo' # for test
    paths:
      - 'projects/**'

jobs:
  trigger-rtd:
    runs-on: ubuntu-latest
    steps:
      - name: Get changed files using GitHub REST API
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching changed files between ${{ github.event.before }} and ${{ github.event.after }}"

          changed_files=$(gh api \
            repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.event.after }} \
            --jq '.files[].filename')

          echo "Changed files:"
          echo "$changed_files"

          # Extract project names like p1, p2 from paths like projects/p1/...
          project_names=$(echo "$changed_files" \
            | grep '^projects/' \
            | awk -F/ '{print $2}' \
            | sort -u)

          echo "Detected changed projects:"
          echo "$project_names"

          echo "changed_projects<<EOF" >> $GITHUB_ENV
          echo "$project_names" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Trigger RTD build
        env: 
          changed_projects: ${{ env.changed_projects }}
        run: |
          for project in $changed_projects; do
            echo "Triggering RTD build for $project"
            curl -X POST "https://readthedocs.com/api/v3/projects/advanced-micro-devices-monorepo-$project/versions/latest/builds/" \
                -H "Authorization: Token ${{ secrets.RTD_TOKEN }}"
          done
