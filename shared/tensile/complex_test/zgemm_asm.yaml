# benchmark assembly and source kernels
GlobalParameters:
#  MinimumRequiredVersion: 4.2.0
  CMakeBuildType: Release
  PrintLevel: 1
  ForceRedoBenchmarkProblems: True
  ForceRedoLibraryLogic: True
  ForceRedoLibraryClient: True
  EnqueuesPerSync: 1
  SyncsPerBenchmark: 1
  NumElementsToValidate: -1
  ValidationMaxToPrint: -1 #4
  ValidationPrintValids: False
  PrintTensorD: 0x3
  # PrintTensorC: 0x3
  # PrintTensorB: 0x3
  # PrintTensorA: 0x3 #0x1
  # PrintTensorRef: 0x3
  # ShortNames: False
  # MergeFiles: True
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  DataInitTypeAlpha: 3
  DataInitTypeBeta: 0
  KernelTime: True
  PrintSolutionRejectionReason: True

BenchmarkProblems:

  - # zgemm NN
    - # ProblemType
      OperationType: GEMM
      DataType: C #Z
      DestDataType: C #Z
      ComputeDataType: C #Z
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True

    - # BenchmarkProblemSizeGroup - Assembly
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        # - LoopTail: [True]
        # - EdgeType: ["ShiftPtr"]
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        # - StoreCInUnroll: [False]
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 2, 2, 2, 2]
        - ScheduleIterAlg: [1]
        - GlobalSplitU: [1] #, 3]
        - PrefetchLocalRead: [False]
        - PrefetchGlobalRead: [True]
        # - ThreadTile:
          ##- [ 3, 5 ]
          # - [ 2, 2 ]
          # - [ 8, 8 ]
        # - WorkGroup:
          # - [ 32,  4,  1 ]
          # - [  4,  4,  2 ]
        - DepthU: [8] #,16,32]
        # - VectorWidth: [-1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # - Exact: [4096, 4096, 1, 8192]
          - Exact: [1024, 1024, 1, 512]
          # - Range: [ [127,1,129], 0, [2], [63,1,64] ]
LibraryLogic:
    # ScheduleName: "gfx950" #aquavanjaram for 942
    # DeviceNames: ["Device 0049", "Device 0050"]
    # ArchitectureName: "gfx950"
  ScheduleName: aquavanjaram
  DeviceNames: [Device 0049, Device 0050]
  ArchitectureName: gfx942