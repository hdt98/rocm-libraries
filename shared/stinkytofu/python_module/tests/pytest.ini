[pytest]
# pytest configuration for StinkyTofu Python module tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    architecture: tests for specific GPU architectures
    composite: tests for composite/lowered instructions
    mfma: tests for MFMA/WMMA instructions
    sparse: tests for sparse matrix instructions

# Minimum version
minversion = 6.0

# Test paths
testpaths = .

