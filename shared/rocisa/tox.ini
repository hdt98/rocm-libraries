[tox]
envlist = py38, py39, py310

[testenv]
skip_install = true  # disable pip install . to ignore setup.py in rocisa
deps =
    -r{toxinidir}/tox-requirements.txt
setenv =
    PYTHONPATH = {envdir}/rocisa/lib
    ROCM_PATH = {env:ROCM_PATH:/opt/rocm}
    # Set Python paths for nanobind to find headers
    Python3_ROOT_DIR = {envdir}
    Python3_EXECUTABLE = {envpython}
commands =
    pip install --upgrade {deps}
    mkdir -p {envdir}/rocisa
    # Use nanobind's cmake integration and specify Python paths explicitly
    sh -c "cmake -S . -B {envdir}/rocisa \
           -DHIPBLASLT_BUNDLE_PYTHON_DEPS=1 \
           -DCMAKE_CXX_COMPILER={env:ROCM_PATH:/opt/rocm}/bin/amdclang++ \
           -DPython3_EXECUTABLE={envpython} \
           -DPython3_ROOT_DIR={envdir} \
           -DCMAKE_PREFIX_PATH={envdir}"
    sh -c "cmake --build {envdir}/rocisa -j $(nproc)"
    pytest test/
allowlist_externals =
    mkdir
    sh
    cmake
