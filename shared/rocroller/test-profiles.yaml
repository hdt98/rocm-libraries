# rocRoller Test profiles
#
# See scripts/lib/rrtest for Python utilities.

profiles:
  quick:
    description: "Quick (smoke) tests (TheRock CI)."
    tests:
    - executable: "test/rocroller-tests"
      framework: "gtest"
      include:
      - "*BasicGEMM*"
      exclude: []
    - executable: "test/rocroller-tests-catch"
      framework: "catch2"
      include:
      - "[kernel-graph]"
      exclude:
      - "[gpu]"

  full:
    description: "All tests (TheRock CI)."
    tests:
    - executable: "test/rocroller-tests"
      framework: "gtest"
      include: []
      exclude:
      - "GPU_KernelTests/GPU_KernelTest.GPU_WholeKernel/1"
    - executable: "test/rocroller-tests-catch"
      framework: "catch2"
      include: []
      exclude: []
    - executable: "pytest"
      framework: "pytest"
      include:
      - "client/"
      exclude:
      - "slow"
    - executable: "pytest"
      framework: "pytest"
      include:
      - "scripts/"
      exclude:
      - "slow"

  codecov-mci:
    description: "Reduced test suite for code coverage analysis (Math CI)."
    tests:
    - executable: "test/rocroller-tests"
      framework: "gtest"
      include: []
      exclude:
        - "*GEMM*"
    - executable: "test/rocroller-tests-catch"
      framework: "catch2"
      include: []
      exclude: []
    - executable: "ctest"
      framework: "ctest"
      include: []
      exclude: [["-LE", "GTEST|CATCH"]]

  precheckin-mci:
    description: "Test suite for pre-commit validation (Math CI)."
    tests:
    - executable: "test/rocroller-tests"
      framework: "gtest"
      include: []
      exclude: []
    - executable: "test/rocroller-tests-catch"
      framework: "catch2"
      include: []
      exclude: []
    - executable: "ctest"
      framework: "ctest"
      include: []
      exclude: [["-LE", "GTEST|CATCH"]]
