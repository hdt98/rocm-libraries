# rocBLAS Test Categories Configuration
# Aligned with rocJenkins job types (precheckin, extended, weekly) and Test Filter Standardization POC.
# rocblas_smoke.yaml defines tests with category: quick, so *quick* is the smoke set.
test_categories:
  quick:
    description: "Smoke - same as rocblas_smoke.yaml (timeout: 10 min)"
    test_patterns: &quick_test_patterns
      - "*quick*"
      - "ErrorFixtureDeathTest.*"
      - "ArgumentLoaderTest.*"
      - "AssemblerTest.*"
      - "ControlGraphTest.*"
      - "CommandTest.*"
      - "ComponentTest.*"
    exclude: &quick_exclude
      - "AssertTest/GPU_AssertTest.GPU_Assert/28"
      - "AssertTest/GPU_AssertTest.GPU_UnconditionalAssert/28"
      - "AssertTest/GPU_AssertTest.GPU_Assert/29"
      - "AssertTest/GPU_AssertTest.GPU_UnconditionalAssert/29"
      - "GPU_KernelTests/GPU_KernelTest.GPU_WholeKernel/1"
    labels:
      - "quick"
      - "smoke"

  standard:
    description: "Precheckin - same as Jenkins precheckin (timeout: 2 hours)"
    test_patterns: *quick_test_patterns
    exclude: *quick_exclude
    labels:
      - "standard"
      - "pr"

  comprehensive:
    description: "Extended - same as Jenkins extended/nightly (timeout: 8 hours)"
    test_patterns:
      - "*"
    exclude: *quick_exclude
    labels:
      - "comprehensive"
      - "nightly"
      - "extended"

  full:
    description: "Stress / weekly - same as Jenkins weekly (stress + HMM)"
    test_patterns:
      - "*"

    exclude: *quick_exclude
    labels:
      - "full"
      - "weekly"


# GPU-specific exclusions can be added here when needed (see shared/ctest/README.md).
# exclude_gpu:
#   exclude_gpu_gfxXXXX:
#     test_patterns: [...]
#     labels: ["quick", "standard", "comprehensive", "stress", "ex_gpu_gfxXXXX"]

execution_settings:
  default_timeout: 300
  timeout_multiplier: 1
  environment:
    OPENBLAS_NUM_THREADS: "48"
    OMP_NUM_THREADS: "48"
  category_timeouts:
    quick: 600    # 10 min (quick suite can exceed 300s on some systems)
    standard: 7200    # ~2 hours (standard can take over an hour)
    comprehensive: 28800   # 8 hours
    full: 86400       # 24 hours
