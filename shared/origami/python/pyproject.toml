[build-system]
requires = [
    "scikit-build-core>=0.5",
     "nanobind>=2.0.0"
]
build-backend = "scikit_build_core.build"

[project]
name = "origami"
version = "0.1.0"
description = "Python API and bindings for the ROCm Origami library"
readme = "README.md"
license = { text = "MIT" }
authors = [{name = "ROCm Team", email="rocm@amd.com"}]
requires-python = ">=3.8"

[tool.scikit-build]
wheel.packages = ["src/origami"]
build-dir = "build"
minimum-version = "3.15"
generator = "Ninja"
cmake.verbose = true
sdist.exclude = ["../../*", "../*", "*.md", "*.sh", "tests/*"]
wheel.exclude = ["../../*", "../*", "*.md", "*.sh", "tests/*"]

