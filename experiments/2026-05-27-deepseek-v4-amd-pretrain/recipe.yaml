runtime:
  status: not_launched
  raw_outputs_policy: keep_logs_checkpoints_traces_outside_repo

initial_source_review_focus:
  - dsv4_model_definition_and_mhc_state_shape
  - compressed_attention_parallelism_dp_tp_sp_ep_pp_cp
  - fp8_rollout_bf16_or_fp8_training_precision_boundaries
  - checkpoint_conversion_and_distributed_optimizer_precision
  - amd_kernel_replacements_for_tilelang_or_cuda_specific_paths

validation:
  status: not_run
  required_before_promotion:
    - command_shape
    - node_layout
    - dependency_shas
    - completed_iterations
    - skipped_and_nan_counts
    - loss_or_health_metric_movement
    - throughput
    - checkpoint_or_result_markers
