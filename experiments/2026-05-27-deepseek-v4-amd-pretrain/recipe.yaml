name: 2026-05-27-deepseek-v4-amd-pretrain
kind: experiment
type: pretraining
status: native_primus_turbo_hot_helper_baseline_cleanup

frameworks:
  primary: torchtitan
  backend_candidates:
    - primus-turbo
    - mori
    - primus
    - megatron-LM

model_family: deepseek-v4
hardware_target: mi350x

objective: >-
  Build a reproducible AMD MI350 DeepSeek-V4-style pretraining canary and
  promote native Primus-Turbo/MORI balanced-MoE hot-helper only when it beats
  the strongest retained baselines without hidden adapter overhead.

branch_sync:
  branch: sonle5_dsv4_amd_pretrain
  baseline_before_experiment: d4468c5b3dd072c9034fd02b268e011067850550
  relation_to_local_main_before_commit: identical
  synced_at: 2026-05-27
  current_diff_policy: >-
    Keep experiment docs concise, keep raw logs/traces outside the repo, and
    avoid broad git scans over dirty WIP/vendor trees.

execution_policy:
  selected_path: direct_torchtitan_torchrun
  primus_role: reference_or_legacy_proxy_only
  raw_outputs_policy: /scratch/sonle5/dsv4_pretrain_canary_20260527
  canonical_launcher: launchers/torchtitan_direct_deepseek_v4_4x8xmi350_canary.sh
  target_contract: targets/torchtitan_deepseek_v4_flash_12layer_ceiling_probe_bf16_4x8xmi350_canary.yaml

source_layout:
  wip:
    primus:
      path: ../../projects/primus
      role: amd_training_framework_reference
    primus_turbo:
      path: ../../projects/primus-turbo
      role: active_native_hot_helper_and_turboep_backend
    torchtitan:
      path: ../../projects/torchtitan
      role: active_policy_layer_and_training_integration
    megatron_lm:
      path: ../../projects/megatron-LM
      role: modeling_reference
  references:
    ascend_cann_recipes_train:
      path: ../../references/ascend/ascend-cann-recipes-train
      role: ascend_torchtitan_npu_recipe_and_sasg_moe_reference
    ascend_torchtitan_npu:
      path: ../../references/ascend/torchtitan-npu-v0.2.2-dev
      role: ascend_torchtitan_npu_operator_wrapper_reference
    mori:
      path: ../../references/amd/mori
      role: amd_sdma_and_ep_transport_reference
    hipkittens:
      path: ../../references/amd/hipkittens
      role: amd_attention_kernel_reference
    megatron_lm_pr28:
      path: ../../references/nvidia/megatron-lm-deepseek-v4-pr28
      role: nvidia_deepseek_v4_training_reference
    miles_pr1045:
      path: ../../references/nvidia/miles-deepseek-v4-pr1045
      role: nvidia_day0_rl_reference
    nvidia_day0:
      urls:
        - https://www.lmsys.org/blog/2026-04-25-deepseek-v4/#reinforcement-learning-miles-support
        - https://github.com/radixark/miles/issues/1046
        - https://github.com/radixark/miles/pull/1045
        - https://github.com/radixark/Megatron-LM/pull/28

active_surfaces:
  deepseek_mtp1:
    model: DeepSeek-V4 Flash 12-layer
    notes: current corrected default; MTP1 enabled explicitly in the table harness
  deepseek_nomtp:
    model: DeepSeek-V4 Flash 12-layer
    notes: historical control needed to reproduce the older roughly 8.5k tok/GPU/s MBS8 row
  qwen:
    model: Qwen3.5-397B-A17B 8-layer
  kimi:
    model: Kimi-K2.6 6-layer

balanced_moe_goal:
  baseline_matrix:
    models:
      - deepseek_mtp1
      - deepseek_nomtp
      - qwen
      - kimi
    micro_batch_sizes: [1, 2, 4, 8]
    variants:
      - standard_ep_no_helper
      - primus_turbo_turboep_no_helper
      - standard_ep_top8_helper_mori_sdma
  candidate:
    name: native_primus_turbo_hot_helper_mori_sdma
    ownership:
      torchtitan: policy_layer_autograd_and_saved_forward_partition_plan
      primus_turbo: hot_helper_abi_and_normal_topk_turboep_dispatch_combine
      mori: sdma_owner_compact_hot_weight_and_hot_dweight_transport
    acceptance:
      deepseek_mbs4_mbs8_min_uplift_pct: 3.0
      qwen_kimi_max_regression_pct_without_fit_boundary_change: 2.0
      correctness:
        - finite_forward_backward
        - loss_moves_on_20_step_runs
        - no_missing_token_gradient_path_through_native_collectives

current_evidence:
  status_doc: docs/status.md
  changesets_index: changesets/README.md
  tools_index: tools/README.md
  raw_run_root: /scratch/sonle5/dsv4_pretrain_canary_20260527
  compact_artifact_dir: run_artifacts
  important_read: >-
    The historical DeepSeek helper MBS8 roughly 8.5k tok/GPU/s row was no-MTP
    or pre-MTP-default. Current-source MTP1 rows build about 5.84B more
    parameters and need a separate deepseek_nomtp control before comparing.

tools:
  retained:
    - tools/run_balanced_moe_table_sweep.py
    - tools/check_balanced_moe_backend_parity.py
    - tools/check_balanced_moe_model_shapes.py
    - tools/check_balanced_moe_model_surfaces.py
    - tools/check_balanced_moe_goal_scope.py
    - tools/mori_hot_helper_pack_smoke.py
    - tools/smoke_mori_owner_compact_exchange_gloo.py
  policy: >-
    Keep this directory minimal. Old sparse-MLA/kernel/optimizer probes belong
    outside the repo or in compact changeset notes, not in the table harness.

validation:
  local_static:
    - py_compile_tools
    - backend_capability_import_checks
    - owner_compact_metadata_shape_checks
  remote_training:
    - 20_step_baseline_table
    - 20_step_native_candidate_table
  pending: >-
    Wait for a clean 8xMI350 node before relaunching the corrected baseline
    table from remote tmux.
