# hipDNN GPU Reference Test Categories
#
# quick and comprehensive are disjoint and together cover all tests.
# Only quick carries unit_test so ninja unit-check is the fast developer path.
# ninja check (bare ctest) runs both categories.
#
# Shapes are prefixed: Small* (quick), Medium*/Large* (comprehensive)
# Standalone (non-parameterized) tests start with Test*
#
# Category names match test_runner.py VALID_TEST_CATEGORIES so TheRock CI
# can run: TEST_TYPE=comprehensive to exercise medium/large shapes.

test_categories:
  quick:
    description: "Small shapes + standalone tests - Run on every PR"
    test_patterns:
      - "Small*"
      - "Test*"
    labels:
      - "quick"
      - "unit_test"

  comprehensive:
    description: "Medium + Large shapes - Run via TEST_TYPE=comprehensive"
    test_patterns:
      - "Medium*"
      - "Large*"
    labels:
      - "comprehensive"

execution_settings:
  default_timeout: 300
  category_timeouts:
    quick: 300
    comprehensive: 1800
